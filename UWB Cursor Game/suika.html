<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UWB Suika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: rgb(10, 10, 15);
      font-family: "Outfit", sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const CONFIG = {
  WS_URL: "ws://localhost:8765",
  UWB_BOUNDS: { xMin: 0, xMax: 4, yMin: 0, yMax: 3 },
  PLAYER_TAGS: { p1: 1, p2: 2 },
  CURSOR: {
    size: 24,
    trailLength: 12,
    p1Color: [0, 210, 255],
    p2Color: [255, 50, 200]
  },
  DEMO_TIMEOUT_MS: 3000,
  WORLD_PADDING: 100,
  PLAYER_ACTIVE_TIMEOUT_MS: 1200,
  FILTER: {
    minCutoff: 1.0,
    beta: 0.007,
    dCutoff: 1.0,
    freq: 20
  }
};

const FRUITS = [
  { name: "Cherry", radius: 16, color: [255, 107, 107] },
  { name: "Strawberry", radius: 22, color: [255, 142, 142] },
  { name: "Grape", radius: 28, color: [179, 136, 255] },
  { name: "Dekopon", radius: 34, color: [255, 183, 77] },
  { name: "Orange", radius: 40, color: [255, 167, 38] },
  { name: "Apple", radius: 48, color: [239, 83, 80] },
  { name: "Pear", radius: 56, color: [174, 213, 129] },
  { name: "Peach", radius: 64, color: [244, 143, 177] },
  { name: "Pineapple", radius: 72, color: [255, 213, 79] },
  { name: "Melon", radius: 82, color: [129, 199, 132] },
  { name: "Watermelon", radius: 94, color: [102, 187, 106] }
];

const game = {
  state: "start",
  players: {
    p1: createPlayer(CONFIG.PLAYER_TAGS.p1, "P1", CONFIG.CURSOR.p1Color),
    p2: createPlayer(CONFIG.PLAYER_TAGS.p2, "P2", CONFIG.CURSOR.p2Color)
  },
  ws: {
    socket: null,
    connected: false,
    reconnectTimer: null,
    lastDataMs: 0,
    packetCount: 0,
    parseErrors: 0,
    lastTag: null
  },
  demo: {
    enabled: true,
    forced: false
  },
  ambientParticles: [],
  effects: {
    flash: { active: false, startMs: 0, duration: 0, color: [255, 255, 255], alpha: 0 },
    shake: { active: false, startMs: 0, duration: 0, intensity: 0 },
    burstParticles: [],
    floatingScores: [],
    mergeFlashes: []
  },
  input: {
    prevMouseDown: false,
    backHoverMs: 0,
    holdStartMs: 0,
    holdX: 0,
    holdY: 0
  },
  suika: {
    fruits: [],
    nextId: 1,
    container: { x: 0, y: 0, w: 400, h: 550 },
    dangerY: 0,
    aimX: 0,
    currentTier: 0,
    nextTier: 0,
    dropCooldownUntil: 0,
    score: 0,
    displayedScore: 0,
    bestScore: 0,
    merges: 0,
    comboCount: 0,
    comboTextUntil: 0,
    lastMergeMs: 0,
    warningPulse: 0,
    gameOverAt: 0
  },
  navigateTo: ""
};
let runtimeQueryString = "";
const SHARED_CALIBRATION_KEY = "uwb_room_calibration_v1";

function isValidBounds(bounds) {
  if (!bounds) return false;
  const xMin = Number(bounds.xMin);
  const xMax = Number(bounds.xMax);
  const yMin = Number(bounds.yMin);
  const yMax = Number(bounds.yMax);
  return Number.isFinite(xMin) && Number.isFinite(xMax) && Number.isFinite(yMin) && Number.isFinite(yMax) && xMax > xMin && yMax > yMin;
}

function readSharedCalibrationBounds(tagId = CONFIG.PLAYER_TAGS.p1) {
  try {
    const raw = localStorage.getItem(SHARED_CALIBRATION_KEY);
    if (!raw) return null;
    const payload = JSON.parse(raw);
    const byTag = payload && payload.tags ? payload.tags[String(tagId)] : null;
    if (isValidBounds(byTag)) return byTag;
    if (isValidBounds(payload && payload.global)) return payload.global;
  } catch (err) {}
  return null;
}

function resolveUwbBoundsForTag(tagId = CONFIG.PLAYER_TAGS.p1) {
  return readSharedCalibrationBounds(tagId) || CONFIG.UWB_BOUNDS;
}

function createPlayer(tagId, label, color) {
  return {
    tagId,
    label,
    color,
    active: false,
    screenX: null,
    screenY: null,
    rawX: null,
    rawY: null,
    lastUpdateMs: 0,
    trail: [],
    filters: null
  };
}

function ensurePlayerFilters(player) {
  if (player.filters) return;
  player.filters = {
    x: new OneEuroFilter(CONFIG.FILTER.freq, CONFIG.FILTER.minCutoff, CONFIG.FILTER.beta, CONFIG.FILTER.dCutoff),
    y: new OneEuroFilter(CONFIG.FILTER.freq, CONFIG.FILTER.minCutoff, CONFIG.FILTER.beta, CONFIG.FILTER.dCutoff)
  };
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  textFont("Outfit");
  applyURLOverrides();
  initializeAmbientParticles();
  connectWebSocket();
  resetSuika(true);
  exposeAutomationHooks();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initializeAmbientParticles();
  computeContainer();
}

function computeContainer() {
  const c = game.suika.container;
  c.w = min(400, width * 0.42);
  c.h = min(550, height * 0.74);
  c.x = width * 0.5 - c.w * 0.5;
  c.y = height * 0.17;
  game.suika.dangerY = c.y + 80;
}

function resetSuika(toStart = false) {
  computeContainer();
  game.suika.fruits = [];
  game.suika.nextId = 1;
  game.suika.currentTier = floor(random(0, 5));
  game.suika.nextTier = floor(random(0, 5));
  game.suika.dropCooldownUntil = 0;
  game.suika.score = 0;
  game.suika.displayedScore = 0;
  game.suika.merges = 0;
  game.suika.comboCount = 0;
  game.suika.comboTextUntil = 0;
  game.suika.lastMergeMs = 0;
  game.suika.warningPulse = 0;
  game.suika.gameOverAt = 0;
  game.suika.aimX = width * 0.5;
  game.state = toStart ? "start" : "playing";
}

function draw() {
  updateDemoMode();
  pruneStalePlayers();
  updatePlayerTrails();
  updateEffects();

  drawBackground();
  drawAmbientParticles();

  push();
  applyScreenShake();
  drawContainer();

  if (game.state === "start") {
    drawStartScreen();
  } else {
    updateSuikaGameplay();
    drawFruits();
    drawAimAndPreview();
    if (game.state === "gameover") drawGameOverOverlay();
  }

  drawMergeFlashes();
  drawBurstParticles();
  drawFloatingScores();
  drawCursors();
  pop();

  drawHUD();
  drawConnectionIndicator();
  drawDemoBadge();
  drawScreenFlash();
  drawBackButton();

  if (game.navigateTo) {
    const url = game.navigateTo;
    game.navigateTo = "";
    window.location.href = url;
  }

  game.input.prevMouseDown = mouseIsPressed;
}

function updateSuikaGameplay() {
  if (game.state !== "playing") return;

  updateAimFromCursor();
  updateDropHold();
  if (shouldDropNow()) {
    dropCurrentFruit();
  }

  const substeps = game.suika.fruits.length > 24 ? 3 : 2;
  for (let step = 0; step < substeps; step++) {
    stepFruitPhysics();
    resolveFruitCollisionsAndMerges();
  }

  checkGameOverCondition();
  game.suika.displayedScore = lerp(game.suika.displayedScore, game.suika.score, 0.14);
}

function isUwbControlActive() {
  const p = game.players.p1;
  return !game.demo.enabled && p.active && p.screenX !== null && p.screenY !== null;
}

function updateAimFromCursor() {
  const p = game.players.p1;
  const c = game.suika.container;
  const r = FRUITS[game.suika.currentTier].radius;
  const minX = c.x + r + 8;
  const maxX = c.x + c.w - r - 8;
  let x = game.suika.aimX;
  if (p.active && p.screenX !== null) x = p.screenX;
  else x = mouseX;
  const target = constrain(x, minX, maxX);
  game.suika.aimX = isUwbControlActive() ? lerp(game.suika.aimX, target, 0.36) : target;
}

function updateDropHold() {
  const p = game.players.p1;
  const cx = p.active && p.screenX !== null ? p.screenX : mouseX;
  const cy = p.active && p.screenY !== null ? p.screenY : mouseY;

  if (game.input.holdStartMs === 0) {
    game.input.holdStartMs = millis();
    game.input.holdX = cx;
    game.input.holdY = cy;
    return;
  }

  const moveThreshold = isUwbControlActive() ? 28 : 20;
  if (dist(cx, cy, game.input.holdX, game.input.holdY) > moveThreshold) {
    game.input.holdStartMs = millis();
    game.input.holdX = cx;
    game.input.holdY = cy;
  }
}

function shouldDropNow() {
  if (millis() < game.suika.dropCooldownUntil) return false;
  if (game.state !== "playing") return false;

  const clickDrop = mouseIsPressed && !game.input.prevMouseDown;
  const holdMs = isUwbControlActive() ? 430 : 500;
  const holdDrop = millis() - game.input.holdStartMs >= holdMs;
  if (clickDrop || holdDrop) {
    game.input.holdStartMs = millis();
    return true;
  }
  return false;
}

function dropCurrentFruit() {
  if (game.suika.fruits.length >= 46) {
    triggerFlash([239, 68, 68], 140, 75);
    addFloatingText(game.suika.aimX, game.suika.container.y - 26, "TOO CROWDED", [255, 170, 120]);
    game.suika.dropCooldownUntil = millis() + 260;
    return;
  }

  const tier = game.suika.currentTier;
  const def = FRUITS[tier];
  const c = game.suika.container;

  const fruit = {
    id: game.suika.nextId++,
    tier,
    x: game.suika.aimX,
    y: c.y + def.radius + 4,
    vx: 0,
    vy: 0,
    r: def.radius,
    mass: def.radius * def.radius,
    ang: random(TWO_PI),
    spin: random(-0.04, 0.04),
    bornMs: millis(),
    merging: false,
    settleDustDone: false,
    spawnScaleUntil: millis() + 220
  };

  game.suika.fruits.push(fruit);
  game.suika.currentTier = game.suika.nextTier;
  game.suika.nextTier = floor(random(0, 5));
  const extra = game.suika.fruits.length > 30 ? 130 : game.suika.fruits.length > 22 ? 70 : 0;
  const base = isUwbControlActive() ? 440 : 500;
  game.suika.dropCooldownUntil = millis() + base + extra;
}

function stepFruitPhysics() {
  const c = game.suika.container;
  for (const f of game.suika.fruits) {
    if (f.merging) continue;

    f.vy += 0.4;
    f.vx *= 0.998;
    f.vy *= 0.998;

    f.x += f.vx;
    f.y += f.vy;
    f.ang += f.spin;

    const left = c.x + 6;
    const right = c.x + c.w - 6;
    const bottom = c.y + c.h - 8;

    if (f.x - f.r < left) {
      f.x = left + f.r;
      f.vx *= -0.3;
    }
    if (f.x + f.r > right) {
      f.x = right - f.r;
      f.vx *= -0.3;
    }
    if (f.y + f.r > bottom) {
      f.y = bottom - f.r;
      f.vy *= -0.3;
      f.vx *= 0.95;
      if (!f.settleDustDone && abs(f.vy) < 0.4 && abs(f.vx) < 0.3) {
        emitParticles(f.x, f.y + f.r * 0.8, [200, 210, 220], 4, 1.8);
        f.settleDustDone = true;
      }
    }

    if (abs(f.vx) < 0.1) f.vx = 0;
    if (abs(f.vy) < 0.1) f.vy = 0;
  }
}

function resolveFruitCollisionsAndMerges() {
  const fruits = game.suika.fruits;
  const merges = [];

  for (let i = 0; i < fruits.length; i++) {
    const a = fruits[i];
    if (a.merging) continue;
    for (let j = i + 1; j < fruits.length; j++) {
      const b = fruits[j];
      if (b.merging) continue;

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const d2 = dx * dx + dy * dy;
      const rr = a.r + b.r;
      if (d2 >= rr * rr) continue;

      const d = sqrt(max(d2, 0.0001));
      const nx = dx / d;
      const ny = dy / d;
      const overlap = rr - d;

      const totalMass = a.mass + b.mass;
      const aPush = overlap * (b.mass / totalMass);
      const bPush = overlap * (a.mass / totalMass);
      a.x -= nx * aPush;
      a.y -= ny * aPush;
      b.x += nx * bPush;
      b.y += ny * bPush;

      const rvx = b.vx - a.vx;
      const rvy = b.vy - a.vy;
      const velAlongNormal = rvx * nx + rvy * ny;
      if (velAlongNormal < 0) {
        const restitution = 0.24;
        const impulse = -(1 + restitution) * velAlongNormal / (1 / a.mass + 1 / b.mass);
        const ix = impulse * nx;
        const iy = impulse * ny;
        a.vx -= ix / a.mass;
        a.vy -= iy / a.mass;
        b.vx += ix / b.mass;
        b.vy += iy / b.mass;
      }

      const tx = -ny;
      const ty = nx;
      const tangential = rvx * tx + rvy * ty;
      const friction = tangential * 0.02;
      a.vx += tx * friction;
      a.vy += ty * friction;
      b.vx -= tx * friction;
      b.vy -= ty * friction;

      if (a.tier === b.tier) {
        a.merging = true;
        b.merging = true;
        merges.push([a, b]);
      }
    }
  }

  if (merges.length > 0) {
    processMerges(merges);
  }
}

function processMerges(merges) {
  const removeIds = new Set();
  for (const [a, b] of merges) {
    if (removeIds.has(a.id) || removeIds.has(b.id)) continue;
    removeIds.add(a.id);
    removeIds.add(b.id);

    const mx = (a.x + b.x) * 0.5;
    const my = (a.y + b.y) * 0.5;
    const tier = a.tier;

    const now = millis();
    if (now - game.suika.lastMergeMs <= 500) {
      game.suika.comboCount += 1;
    } else {
      game.suika.comboCount = 1;
    }
    game.suika.lastMergeMs = now;

    if (tier >= FRUITS.length - 1) {
      game.suika.score += 2000;
      addFloatingText(mx, my, "+2000", [255, 226, 110]);
      emitParticles(mx, my, FRUITS[tier].color, 34, 7);
      game.suika.merges++;
      spawnMergeFlash(mx, my, FRUITS[tier].radius * 2.2);
      continue;
    }

    const nextTier = tier + 1;
    const def = FRUITS[nextTier];
    const nf = {
      id: game.suika.nextId++,
      tier: nextTier,
      x: mx,
      y: my,
      vx: random(-0.9, 0.9),
      vy: random(-4, -2),
      r: def.radius,
      mass: def.radius * def.radius,
      ang: random(TWO_PI),
      spin: random(-0.05, 0.05),
      bornMs: now,
      merging: false,
      settleDustDone: false,
      spawnScaleUntil: now + 220
    };
    game.suika.fruits.push(nf);

    const points = (tier + 1) * (tier + 1) * 10;
    game.suika.score += points;
    game.suika.merges++;
    addFloatingText(mx, my, `+${points}`, [120, 255, 180]);
    emitParticles(mx, my, def.color, 24, 6);
    triggerShake(4, 200);
    triggerFlash([255, 255, 255], 140, 70);
    spawnMergeFlash(mx, my, def.radius * 2.0);
  }

  game.suika.fruits = game.suika.fruits.filter((f) => !removeIds.has(f.id));

  if (game.suika.comboCount >= 2) {
    game.suika.comboTextUntil = millis() + 620;
  }
}

function spawnMergeFlash(x, y, radius) {
  game.effects.mergeFlashes.push({ x, y, radius, bornMs: millis(), duration: 300 });
}

function checkGameOverCondition() {
  const dangerY = game.suika.dangerY;
  const uwb = isUwbControlActive();
  const dangerLead = uwb ? 36 : 50;
  const failSpeed = uwb ? 0.28 : 0.35;
  const failAge = uwb ? 1700 : 1200;
  const failOffset = uwb ? -8 : 0;
  let nearDanger = false;
  for (const f of game.suika.fruits) {
    const speed = sqrt(f.vx * f.vx + f.vy * f.vy);
    const age = millis() - f.bornMs;
    if (f.y < dangerY + dangerLead && speed < 0.8) nearDanger = true;

    if (f.y < dangerY + failOffset && speed < failSpeed && age > failAge) {
      game.state = "gameover";
      game.suika.gameOverAt = millis();
      game.suika.bestScore = max(game.suika.bestScore, game.suika.score);
      triggerFlash([239, 68, 68], 220, 110);
      triggerShake(8, 300);
      break;
    }
  }
  game.suika.warningPulse = nearDanger ? (sin(millis() * 0.012) * 0.5 + 0.5) : 0;
}

function drawContainer() {
  const c = game.suika.container;

  noStroke();
  fill(18, 20, 28, 220);
  rect(c.x, c.y, c.w, c.h, 24);

  noFill();
  stroke(255, 255, 255, 68);
  strokeWeight(3);
  rect(c.x, c.y, c.w, c.h, 24);

  noFill();
  stroke(140, 180, 255, 28);
  strokeWeight(10);
  rect(c.x + 6, c.y + 6, c.w - 12, c.h - 12, 20);

  drawDangerLine();
}

function drawDangerLine() {
  const c = game.suika.container;
  const y = game.suika.dangerY;
  stroke(255, 90, 90, 80 + game.suika.warningPulse * 130);
  strokeWeight(3);
  const seg = 14;
  const gap = 9;
  for (let x = c.x + 12; x < c.x + c.w - 12; x += seg + gap) {
    line(x, y, min(c.x + c.w - 12, x + seg), y);
  }

  if (game.suika.warningPulse > 0) {
    noStroke();
    fill(255, 60, 60, 30 * game.suika.warningPulse);
    rect(c.x + 6, c.y + 6, c.w - 12, 70, 10);
  }
}

function drawFruits() {
  for (const f of game.suika.fruits) {
    drawOneFruit(f);
  }
}

function drawOneFruit(f) {
  const def = FRUITS[f.tier];
  const c = def.color;
  const now = millis();
  const spawnP = constrain((now - (f.spawnScaleUntil - 220)) / 220, 0, 1);
  const sc = now < f.spawnScaleUntil ? lerp(0.5, 1, spawnP) : 1;

  noStroke();
  fill(0, 0, 0, 45);
  ellipse(f.x, f.y + f.r * 0.85, f.r * 1.7, f.r * 0.42);

  push();
  translate(f.x, f.y);
  rotate(f.ang);
  scale(sc);

  stroke(max(0, c[0] - 28), max(0, c[1] - 28), max(0, c[2] - 28), 220);
  strokeWeight(2);
  fill(c[0], c[1], c[2], 230);
  circle(0, 0, f.r * 2);

  noStroke();
  fill(255, 255, 255, 85);
  ellipse(-f.r * 0.26, -f.r * 0.24, f.r * 0.72, f.r * 0.5);

  if (f.tier === FRUITS.length - 1) {
    stroke(50, 120, 70, 130);
    strokeWeight(2);
    noFill();
    arc(0, 0, f.r * 1.35, f.r * 1.35, -PI * 0.15, PI * 0.35);
    arc(0, 0, f.r * 1.55, f.r * 1.55, PI * 0.65, PI * 1.1);
  }

  noStroke();
  fill(22, 22, 30, 130);
  circle(-f.r * 0.18, -f.r * 0.08, max(2, f.r * 0.12));
  circle(f.r * 0.15, -f.r * 0.08, max(2, f.r * 0.12));
  stroke(22, 22, 30, 110);
  strokeWeight(max(1, f.r * 0.06));
  noFill();
  arc(0, f.r * 0.1, f.r * 0.36, f.r * 0.24, 0, PI);

  noStroke();
  fill(255, 255, 255, 130);
  textAlign(CENTER, CENTER);
  textStyle(800);
  textSize(max(10, f.r * 0.34));
  text(`${f.tier + 1}`, 0, 1);

  pop();
}

function drawAimAndPreview() {
  const c = game.suika.container;
  const def = FRUITS[game.suika.currentTier];

  stroke(175, 220, 255, 130);
  strokeWeight(2);
  for (let y = c.y - 26; y < c.y + 8; y += 10) {
    line(game.suika.aimX, y, game.suika.aimX, y + 5);
  }

  const py = c.y - 22;
  const preview = {
    tier: game.suika.currentTier,
    x: game.suika.aimX,
    y: py,
    r: def.radius,
    ang: 0,
    spawnScaleUntil: 0
  };
  drawOneFruit(preview);

  const holdP = constrain((millis() - game.input.holdStartMs) / 500, 0, 1);
  if (millis() >= game.suika.dropCooldownUntil) {
    noFill();
    stroke(255, 240, 190, 120);
    strokeWeight(3);
    circle(game.suika.aimX, py, def.radius * 2.6);
    stroke(255, 210, 120, 230);
    arc(game.suika.aimX, py, def.radius * 2.6, def.radius * 2.6, -HALF_PI, -HALF_PI + TWO_PI * holdP);
  }
}

function drawStartScreen() {
  textAlign(CENTER, CENTER);
  textStyle(900);
  textSize(min(88, width * 0.12));
  fill(255, 235);
  text("SUIKA", width * 0.5, height * 0.14);

  textStyle(500);
  textSize(20);
  fill(220, 232, 255, 185);
  text("Move to aim, hold still to drop.", width * 0.5, height * 0.24);
  text("Match fruits to merge.", width * 0.5, height * 0.28);

  const pulse = map(sin(millis() * 0.006), -1, 1, 100, 255);
  fill(255, pulse);
  textStyle(800);
  textSize(28);
  text("Press SPACE to start", width * 0.5, height * 0.35);

  const y = height * 0.86;
  const gap = min(86, width / (FRUITS.length + 1));
  let x = width * 0.5 - gap * (FRUITS.length - 1) * 0.5;
  for (let i = 0; i < FRUITS.length; i++) {
    const f = FRUITS[i];
    const p = { tier: i, x, y, r: min(f.radius * 0.42, 28), ang: 0, spawnScaleUntil: 0 };
    drawOneFruit(p);
    fill(255, 160);
    noStroke();
    textSize(10);
    textAlign(CENTER, TOP);
    text(f.name, x, y + 24);
    x += gap;
  }
}

function drawGameOverOverlay() {
  noStroke();
  fill(8, 8, 14, 165);
  rect(0, 0, width, height);

  textAlign(CENTER, CENTER);
  textStyle(900);
  textSize(70);
  fill(255, 235);
  text("GAME OVER", width * 0.5, height * 0.36);

  textStyle(700);
  textSize(30);
  fill(255, 218, 128, 230);
  text(`Score ${floor(game.suika.score)}`, width * 0.5, height * 0.46);

  textStyle(500);
  textSize(18);
  fill(220, 230, 255, 180);
  text(`Merges ${game.suika.merges}   Best ${floor(game.suika.bestScore)}`, width * 0.5, height * 0.52);

  const pulse = map(sin(millis() * 0.006), -1, 1, 120, 255);
  fill(255, pulse);
  textStyle(800);
  textSize(24);
  text("Press SPACE to retry", width * 0.5, height * 0.6);
}

function drawHUD() {
  game.suika.displayedScore = lerp(game.suika.displayedScore, game.suika.score, 0.15);

  textAlign(CENTER, TOP);
  textStyle(900);
  textSize(36);
  fill(245, 250, 255, 235);
  text(floor(game.suika.displayedScore), width * 0.5, 12);

  textAlign(RIGHT, TOP);
  textStyle(700);
  textSize(14);
  fill(255, 190);
  text(`Merges ${game.suika.merges}`, width - 16, 14);

  fill(255, 200, 120, 210);
  text("NEXT", width - 16, 36);
  drawNextFruitPreview(width - 38, 72);

  if (game.suika.bestScore > 0) {
    textStyle(500);
    textSize(12);
    fill(220, 230, 255, 160);
    text(`BEST ${floor(game.suika.bestScore)}`, width - 16, 106);
  }

  if (game.suika.comboCount >= 2 && millis() < game.suika.comboTextUntil) {
    textAlign(CENTER, CENTER);
    textStyle(900);
    textSize(28 + game.suika.comboCount * 2);
    fill(255, 220, 120, 230);
    text(`COMBO x${game.suika.comboCount}!`, width * 0.5, height * 0.12);
  }
}

function drawNextFruitPreview(x, y) {
  const tier = game.suika.nextTier;
  const def = FRUITS[tier];
  const p = { tier, x, y, r: min(22, def.radius * 0.42), ang: 0, spawnScaleUntil: 0 };
  drawOneFruit(p);
}

function drawBackButton() {
  const rectObj = { x: 10, y: 8, w: 88, h: 24 };
  const mouseHover = pointInRect(mouseX, mouseY, rectObj);
  const pHover = getActivePlayers().some((p) => cursorOverlapsRect(p, rectObj));
  const hover = mouseHover || pHover;

  if (hover) {
    if (game.input.backHoverMs === 0) game.input.backHoverMs = millis();
    if ((mouseIsPressed && !game.input.prevMouseDown) || millis() - game.input.backHoverMs > 1000) {
      game.navigateTo = withRuntimeQuery("game_menu.html");
    }
  } else {
    game.input.backHoverMs = 0;
  }

  noStroke();
  fill(10, 10, 15, 150);
  rect(rectObj.x, rectObj.y, rectObj.w, rectObj.h, 6);
  fill(255, hover ? 255 : 130);
  textAlign(LEFT, CENTER);
  textStyle(600);
  textSize(14);
  text("← MENU", rectObj.x + 10, rectObj.y + 12);
  if (hover) {
    stroke(255, 220);
    line(rectObj.x + 10, rectObj.y + 18, rectObj.x + 62, rectObj.y + 18);
  }
}

function pointInRect(x, y, r) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

function cursorOverlapsRect(player, rectObj) {
  if (!player.active || player.screenX === null || player.screenY === null) return false;
  const nx = constrain(player.screenX, rectObj.x, rectObj.x + rectObj.w);
  const ny = constrain(player.screenY, rectObj.y, rectObj.y + rectObj.h);
  return dist(player.screenX, player.screenY, nx, ny) <= CONFIG.CURSOR.size * 0.5;
}

function keyPressed() {
  if (key === "d" || key === "D") game.demo.forced = !game.demo.forced;
  if (key === "Escape") game.navigateTo = withRuntimeQuery("game_menu.html");

  if (key === " " || keyCode === 32) {
    if (game.state === "start") {
      resetSuika(false);
      return;
    }
    if (game.state === "gameover") {
      resetSuika(false);
      return;
    }
    if (game.state === "playing" && millis() >= game.suika.dropCooldownUntil) {
      dropCurrentFruit();
    }
  }
}

function mousePressed() {
  if (game.state === "start") resetSuika(false);
}

function drawBackground() {
  background(10, 10, 16);
  noStroke();
  fill(18, 20, 30, 110);
  circle(width * 0.18, height * 0.22, 340);
  circle(width * 0.82, height * 0.18, 300);
  circle(width * 0.5, height * 0.88, 460);
}

function initializeAmbientParticles() {
  game.ambientParticles = [];
  for (let i = 0; i < 50; i++) game.ambientParticles.push(makeAmbientParticle(true));
}

function makeAmbientParticle(randomY = false) {
  return {
    x: random(width),
    y: randomY ? random(height) : height + random(10, 160),
    vx: random(-0.2, 0.2),
    vy: random(-0.6, -0.1),
    size: random(1, 3),
    alpha: random(15, 50)
  };
}

function drawAmbientParticles() {
  noStroke();
  for (const p of game.ambientParticles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < -8) Object.assign(p, makeAmbientParticle(false));
    if (p.x < -8) p.x = width + 8;
    if (p.x > width + 8) p.x = -8;
    fill(255, p.alpha);
    circle(p.x, p.y, p.size);
  }
}

function updatePlayerTrails() {
  for (const key of ["p1", "p2"]) {
    const p = game.players[key];
    if (!p.active || p.screenX === null || p.screenY === null) continue;
    p.trail.unshift({ x: p.screenX, y: p.screenY });
    if (p.trail.length > CONFIG.CURSOR.trailLength) p.trail.length = CONFIG.CURSOR.trailLength;
  }
}

function drawCursors() {
  for (const p of [game.players.p1, game.players.p2]) {
    if (!p.active || p.screenX === null || p.screenY === null) continue;
    drawCursorTrail(p);
    drawCursorGlow(p);
    noStroke();
    fill(p.color[0], p.color[1], p.color[2], 220);
    circle(p.screenX, p.screenY, CONFIG.CURSOR.size);
    fill(255, 180);
    circle(p.screenX, p.screenY, CONFIG.CURSOR.size * 0.35);
  }
}

function drawCursorTrail(player) {
  const tlen = player.trail.length;
  for (let i = tlen - 1; i >= 0; i--) {
    const pt = player.trail[i];
    const n = i / max(1, tlen - 1);
    const size = lerp(4, CONFIG.CURSOR.size, 1 - n);
    const alpha = lerp(0, 180, 1 - n) * 0.35;
    noStroke();
    fill(player.color[0], player.color[1], player.color[2], alpha);
    circle(pt.x, pt.y, size);
  }
}

function drawCursorGlow(player) {
  const layers = 12;
  const maxR = CONFIG.CURSOR.size * 2.5;
  for (let i = layers; i >= 1; i--) {
    const r = map(i, 1, layers, CONFIG.CURSOR.size * 0.5, maxR);
    const alpha = map(i, 1, layers, 30, 0);
    noStroke();
    fill(player.color[0], player.color[1], player.color[2], alpha);
    circle(player.screenX, player.screenY, r);
  }
}

function getActivePlayers() {
  const out = [];
  for (const key of ["p1", "p2"]) {
    const p = game.players[key];
    if (p.active && p.screenX !== null && p.screenY !== null) out.push(p);
  }
  return out;
}

function triggerShake(intensity, duration) {
  game.effects.shake.active = true;
  game.effects.shake.intensity = intensity;
  game.effects.shake.duration = duration;
  game.effects.shake.startMs = millis();
}

function applyScreenShake() {
  const s = game.effects.shake;
  if (!s.active) return;
  const elapsed = millis() - s.startMs;
  if (elapsed >= s.duration) {
    s.active = false;
    return;
  }
  const decay = 1 - elapsed / s.duration;
  translate(random(-1, 1) * s.intensity * decay, random(-1, 1) * s.intensity * decay);
}

function triggerFlash(color, duration, alpha = 120) {
  game.effects.flash.active = true;
  game.effects.flash.color = [...color];
  game.effects.flash.duration = duration;
  game.effects.flash.startMs = millis();
  game.effects.flash.alpha = alpha;
}

function drawScreenFlash() {
  const f = game.effects.flash;
  if (!f.active) return;
  const elapsed = millis() - f.startMs;
  if (elapsed >= f.duration) {
    f.active = false;
    return;
  }
  const a = map(elapsed, 0, f.duration, f.alpha, 0);
  noStroke();
  fill(f.color[0], f.color[1], f.color[2], a);
  rect(0, 0, width, height);
}

function emitParticles(x, y, color, count = 12, maxSpeed = 5) {
  for (let i = 0; i < count; i++) {
    const ang = random(TWO_PI);
    const spd = random(0.6, maxSpeed);
    game.effects.burstParticles.push({
      x,
      y,
      vx: cos(ang) * spd,
      vy: sin(ang) * spd,
      size: random(3, 8),
      alpha: 255,
      decay: random(4, 8),
      color: [...color]
    });
  }
}

function drawBurstParticles() {
  for (let i = game.effects.burstParticles.length - 1; i >= 0; i--) {
    const p = game.effects.burstParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.99;
    p.vy += 0.06;
    p.alpha -= p.decay;
    p.size *= 0.986;
    if (p.alpha <= 0 || p.size <= 0.7) {
      game.effects.burstParticles.splice(i, 1);
      continue;
    }
    noStroke();
    fill(p.color[0], p.color[1], p.color[2], p.alpha);
    circle(p.x, p.y, p.size);
  }
}

function addFloatingText(x, y, txt, color = [255, 255, 255]) {
  game.effects.floatingScores.push({
    x,
    y,
    vy: -1.7,
    alpha: 255,
    life: 50,
    maxLife: 50,
    text: txt,
    color
  });
}

function drawFloatingScores() {
  for (let i = game.effects.floatingScores.length - 1; i >= 0; i--) {
    const f = game.effects.floatingScores[i];
    f.y += f.vy;
    f.vy *= 0.94;
    f.life -= 1;
    f.alpha = map(f.life, 0, f.maxLife, 0, 255);
    if (f.life <= 0) {
      game.effects.floatingScores.splice(i, 1);
      continue;
    }
    fill(f.color[0], f.color[1], f.color[2], f.alpha);
    textAlign(CENTER, CENTER);
    textStyle(800);
    textSize(24);
    text(f.text, f.x, f.y);
  }
}

function drawMergeFlashes() {
  for (let i = game.effects.mergeFlashes.length - 1; i >= 0; i--) {
    const m = game.effects.mergeFlashes[i];
    const t = constrain((millis() - m.bornMs) / m.duration, 0, 1);
    if (t >= 1) {
      game.effects.mergeFlashes.splice(i, 1);
      continue;
    }
    noFill();
    stroke(255, 255, 255, lerp(200, 0, t));
    strokeWeight(3 * (1 - t));
    circle(m.x, m.y, lerp(0, m.radius, t));
  }
}

function updateEffects() {}

function drawConnectionIndicator() {
  noStroke();
  fill(game.ws.connected ? color(34, 197, 94, 240) : color(239, 68, 68, 240));
  circle(16, 16, 8);
}

function drawDemoBadge() {
  if (!game.demo.enabled) return;
  const w = 62;
  const h = 24;
  noStroke();
  fill(245, 158, 11, 220);
  rect(width - w - 12, 12, w, h, 6);
  fill(20, 14, 8, 240);
  textAlign(CENTER, CENTER);
  textStyle(800);
  textSize(12);
  text("DEMO", width - w * 0.5 - 12, 24);
}

function withRuntimeQuery(path) {
  return runtimeQueryString ? `${path}${runtimeQueryString}` : path;
}

function applyURLOverrides() {
  const params = new URLSearchParams(window.location.search);
  runtimeQueryString = window.location.search || "";

  const wsParam = params.get("ws");
  if (wsParam) CONFIG.WS_URL = wsParam;

  const tag1 = Number(params.get("tag1"));
  if (Number.isFinite(tag1)) {
    CONFIG.PLAYER_TAGS.p1 = tag1;
    game.players.p1.tagId = tag1;
  }
  const tag2 = Number(params.get("tag2"));
  if (Number.isFinite(tag2)) {
    CONFIG.PLAYER_TAGS.p2 = tag2;
    game.players.p2.tagId = tag2;
  }
}

function connectWebSocket() {
  if (game.ws.socket) {
    try { game.ws.socket.close(); } catch (_) {}
  }
  const ws = new WebSocket(CONFIG.WS_URL);
  game.ws.socket = ws;
  ws.onopen = () => { game.ws.connected = true; };
  ws.onmessage = (evt) => {
    game.ws.packetCount++;
    let payload;
    try {
      payload = JSON.parse(evt.data);
    } catch (_) {
      game.ws.parseErrors++;
      return;
    }
    ingestTagPayload(payload);
  };
  ws.onerror = () => { game.ws.connected = false; };
  ws.onclose = () => {
    game.ws.connected = false;
    if (game.ws.reconnectTimer) clearTimeout(game.ws.reconnectTimer);
    game.ws.reconnectTimer = setTimeout(connectWebSocket, 1000);
  };
}

function ingestTagPayload(payload) {
  const tags = normalizeTags(payload);
  if (!tags.length) return;

  game.ws.lastDataMs = millis();
  for (const t of tags) {
    const tid = Number(t.id ?? t.tagId ?? t.tag_id);
    const tx = Number(t.x ?? t.posX ?? t.pos_x);
    const ty = Number(t.y ?? t.posY ?? t.pos_y);
    if (!Number.isFinite(tid) || !Number.isFinite(tx) || !Number.isFinite(ty)) continue;
    game.ws.lastTag = { id: tid, x: tx, y: ty, ms: millis() };
    if (tid === game.players.p1.tagId) updatePlayerFromUWB(game.players.p1, tx, ty);
    else if (tid === game.players.p2.tagId) updatePlayerFromUWB(game.players.p2, tx, ty);
  }
}

function normalizeTags(payload) {
  if (Array.isArray(payload)) return payload;
  if (payload && Array.isArray(payload.tags)) return payload.tags;
  if (payload && payload.tag) return [payload.tag];
  if (payload && (payload.id !== undefined || payload.tagId !== undefined || payload.tag_id !== undefined)) return [payload];
  return [];
}

function mapUWBToScreen(x, y, tagId = CONFIG.PLAYER_TAGS.p1) {
  const shared = readSharedCalibrationBounds(tagId);
  const b = shared || CONFIG.UWB_BOUNDS;
  const pad = shared ? 0 : CONFIG.WORLD_PADDING;
  const px = map(x, b.xMin, b.xMax, pad, width - pad);
  const py = map(y, b.yMin, b.yMax, height - pad, pad);
  return { x: constrain(px, 0, width), y: constrain(py, 0, height) };
}

function updatePlayerFromUWB(player, uwbX, uwbY) {
  ensurePlayerFilters(player);
  const mapped = mapUWBToScreen(uwbX, uwbY, player.tagId);
  const ts = millis() * 0.001;
  player.screenX = player.filters.x.filter(mapped.x, ts);
  player.screenY = player.filters.y.filter(mapped.y, ts);
  player.rawX = uwbX;
  player.rawY = uwbY;
  player.active = true;
  player.lastUpdateMs = millis();
}

function updateDemoMode() {
  const noData = millis() - game.ws.lastDataMs > CONFIG.DEMO_TIMEOUT_MS;
  game.demo.enabled = game.demo.forced || !game.ws.connected || noData;
  if (!game.demo.enabled) return;

  const p1 = game.players.p1;
  ensurePlayerFilters(p1);
  const ts = millis() * 0.001;
  const mx = constrain(mouseX + random(-3, 3), 0, width);
  const my = constrain(mouseY + random(-3, 3), 0, height);
  p1.screenX = p1.filters.x.filter(mx, ts);
  p1.screenY = p1.filters.y.filter(my, ts);
  p1.active = true;
  p1.lastUpdateMs = millis();
}

function pruneStalePlayers() {
  const now = millis();
  for (const key of ["p1", "p2"]) {
    const p = game.players[key];
    if (!p.active) continue;
    if (game.demo.enabled && key === "p1") continue;
    if (now - p.lastUpdateMs > CONFIG.PLAYER_ACTIVE_TIMEOUT_MS) p.active = false;
  }
}

function renderGameToText() {
  return JSON.stringify({
    coordinate_system: "origin=(top-left), +x right, +y down, pixels",
    page: "suika",
    state: game.state,
    score: floor(game.suika.score),
    fruits: game.suika.fruits.length,
    merges: game.suika.merges,
    current_tier: game.suika.currentTier + 1,
    next_tier: game.suika.nextTier + 1,
    aim_x: round(game.suika.aimX),
    danger_y: round(game.suika.dangerY),
    websocket_connected: game.ws.connected,
    demo_enabled: game.demo.enabled,
    players: getActivePlayers().map((p) => ({ label: p.label, x: round(p.screenX), y: round(p.screenY) }))
  });
}

function exposeAutomationHooks() {
  window.render_game_to_text = renderGameToText;
  window.advanceTime = (ms = 16) => new Promise((resolve) => setTimeout(resolve, max(0, ms)));
}

class LowPassFilter {
  constructor(alpha, initVal = 0) {
    this.y = initVal;
    this.s = initVal;
    this.initialized = false;
    this.setAlpha(alpha);
  }
  setAlpha(alpha) { this.alpha = alpha; }
  filter(value) {
    let result;
    if (this.initialized) result = this.alpha * value + (1 - this.alpha) * this.s;
    else { result = value; this.initialized = true; }
    this.y = value;
    this.s = result;
    return result;
  }
  hasLastRawValue() { return this.initialized; }
  lastRawValue() { return this.y; }
  reset(value = 0) {
    this.y = value;
    this.s = value;
    this.initialized = false;
  }
}

class OneEuroFilter {
  constructor(freq, minCutoff = 1.0, beta = 0.0, dCutoff = 1.0) {
    this.freq = freq;
    this.minCutoff = minCutoff;
    this.beta = beta;
    this.dCutoff = dCutoff;
    this.x = new LowPassFilter(this.alpha(minCutoff));
    this.dx = new LowPassFilter(this.alpha(dCutoff));
    this.lastTime = null;
  }
  alpha(cutoff) {
    const te = 1.0 / this.freq;
    const tau = 1.0 / (2 * Math.PI * cutoff);
    return 1.0 / (1.0 + tau / te);
  }
  filter(value, timestamp = null) {
    if (this.lastTime !== null && timestamp !== null) {
      const dt = timestamp - this.lastTime;
      if (dt > 0) this.freq = 1.0 / dt;
    }
    this.lastTime = timestamp;
    const dValue = this.x.hasLastRawValue() ? (value - this.x.lastRawValue()) * this.freq : 0.0;
    const edValue = this.dx.filter(dValue);
    const cutoff = this.minCutoff + this.beta * Math.abs(edValue);
    this.x.setAlpha(this.alpha(cutoff));
    return this.x.filter(value);
  }
  reset(value = 0) {
    this.x.reset(value);
    this.dx.reset(0);
    this.lastTime = null;
  }
}
