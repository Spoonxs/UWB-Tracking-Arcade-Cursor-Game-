function isValidBounds(bounds) {
  if (!bounds) return false;
  const xMin = Number(bounds.xMin);
  const xMax = Number(bounds.xMax);
  const yMin = Number(bounds.yMin);
  const yMax = Number(bounds.yMax);
  return Number.isFinite(xMin) && Number.isFinite(xMax) && Number.isFinite(yMin) && Number.isFinite(yMax) && xMax > xMin && yMax > yMin;
}

function readSharedCalibrationBounds(tagId = CONFIG.PLAYER_TAGS.p1) {
  try {
    const raw = localStorage.getItem(SHARED_CALIBRATION_KEY);
    if (!raw) return null;
    const payload = JSON.parse(raw);
    const byTag = payload && payload.tags ? payload.tags[String(tagId)] : null;
    if (isValidBounds(byTag)) return byTag;
    if (isValidBounds(payload && payload.global)) return payload.global;
  } catch (err) {}
  return null;
}

function writeSharedCalibrationBounds(tagId, bounds) {
  if (!isValidBounds(bounds)) return;
  try {
    let payload = { version: 1, updatedAt: Date.now(), tags: {}, global: bounds };
    const raw = localStorage.getItem(SHARED_CALIBRATION_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") payload = { ...payload, ...parsed };
      if (!payload.tags || typeof payload.tags !== "object") payload.tags = {};
    }
    payload.version = 1;
    payload.updatedAt = Date.now();
    payload.tags[String(tagId)] = bounds;
    payload.global = bounds;
    localStorage.setItem(SHARED_CALIBRATION_KEY, JSON.stringify(payload));
  } catch (err) {}
}

function applySharedCalibrationToPlayer(player) {
  if (!player || !player.hw || !player.hw.cornerCal) return;
  const bounds = readSharedCalibrationBounds(player.tagId);
  if (!isValidBounds(bounds)) return;
  player.hw.cornerCal.bounds = { ...bounds };
  player.hw.cornerCal.ready = true;
  player.hw.cornerCal.active = false;
  player.hw.cornerCal.step = ROOM_CALIBRATION_STEPS.length;
}

function ensurePlayerFilters(player) {
  if (player.filters.x && player.filters.y) return;
  player.filters.x = new OneEuroFilter(CONFIG.FILTER.freq, CONFIG.FILTER.minCutoff, CONFIG.FILTER.beta, CONFIG.FILTER.dCutoff);
  player.filters.y = new OneEuroFilter(CONFIG.FILTER.freq, CONFIG.FILTER.minCutoff, CONFIG.FILTER.beta, CONFIG.FILTER.dCutoff);
}

function initializePlayerFilters() {
  ensurePlayerFilters(game.players.p1);
  ensurePlayerFilters(game.players.p2);
}

  createCanvas(windowWidth, windowHeight);

  initializePlayerFilters();
  initializeAmbientParticles();
  buildMinigames();
  resetGameState();
  connectWebSocket();
  exposeAutomationHooks();
}

function draw() {
  game.runtime.frameCounter++;
  game.runtime.hoverPulse = (sin(millis() * 0.01) + 1) * 0.5;
  updateDemoMode();
  applyHardwareDropoutFallback();
  pruneStalePlayers();
  updatePlayersTrails();
  updateEffects();
  updateStyleGroupByScore();

  const bg = CONFIG.COLORS.bg;
  background(bg[0], bg[1], bg[2]);
  drawAtmosphere();
  drawBackgroundGrid();
  drawAmbientParticles();

  push();
  applyScreenShake();

  if (game.state === "menu") {
    drawMenu();
  } else if (game.state === "countdown") {
    drawCountdown();
  } else if (game.state === "playing") {
    updateAndDrawPlayingState();
  } else if (game.state === "round_result") {
    drawRoundResult();
  } else if (game.state === "results") {
    drawResults();
  } else {
    drawLoading();
  }

  drawGameParticles();
  drawImpactRings();
  drawFloatingScores();
  drawCursors();
  pop();

  drawMapTransitionOverlay();
  drawConnectionIndicator();
  drawDemoBadge();
  drawCalibrationGuide();
  drawScreenFlash();
  drawBackToMenuButton();
  drawCalibrationButton();
  game.ui.prevMouseDown = mouseIsPressed;
}

      setupBossMixForCurrentMinigame(game.runtime.currentDifficulty || game.difficulty);

function initializeAmbientParticles() {
  game.effects.ambientParticles = [];
  for (let i = 0; i < 50; i++) {
    game.effects.ambientParticles.push(makeAmbientParticle(true));
  }
}

function makeAmbientParticle(randomY = false) {
  return {
    x: random(width),
    y: randomY ? random(height) : height + random(20, 220),
    vx: random(-0.25, 0.25),
    vy: random(-0.55, -0.12),
    size: random(1, 3),
    alpha: random(15, 50)
  };
}

function drawAmbientParticles() {
  noStroke();
  for (let p of game.effects.ambientParticles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < -10) {
      Object.assign(p, makeAmbientParticle(false));
    }
    if (p.x < -10) p.x = width + 10;
    if (p.x > width + 10) p.x = -10;
    fill(255, p.alpha);
    circle(p.x, p.y, p.size);
  }
}

function drawBackgroundGrid() {
  noStroke();
  for (let i = 0; i < 40; i++) {
    const x = ((i * 97.3) % 1) * width;
    const y = ((i * 43.9) % 1) * height;
    fill(255, 42);
    circle(x, y, 1.6);
  }
}

function drawAtmosphere() {
  const theme = currentBackgroundTheme();
  const group = currentStyleGroup();
  const top = color(theme.top[0], theme.top[1], theme.top[2]);
  const mid = color(theme.mid[0], theme.mid[1], theme.mid[2]);
  const bottom = color(theme.bottom[0], theme.bottom[1], theme.bottom[2]);
  noStroke();
  for (let i = 0; i < 20; i++) {
    const t = i / 19;
    const c = t < 0.55 ? lerpColor(top, mid, t / 0.55) : lerpColor(mid, bottom, (t - 0.55) / 0.45);
    fill(c);
    rect(0, (height / 20) * i, width, height / 20 + 1);
  }

  const t = millis() * 0.0002;
  const b1 = theme.blobs[0];
  const b2 = theme.blobs[1];
  const b3 = theme.blobs[2];
  fill(b1[0], b1[1], b1[2], 70);
  circle(width * 0.2 + sin(t * 11) * width * 0.045, height * 0.22 + cos(t * 13) * height * 0.04, min(width, height) * 0.18);
  fill(b2[0], b2[1], b2[2], 66);
  circle(width * 0.82 + cos(t * 9) * width * 0.05, height * 0.18 + sin(t * 8) * height * 0.04, min(width, height) * 0.15);
  fill(b3[0], b3[1], b3[2], 65);
  circle(width * 0.72 + sin(t * 7) * width * 0.04, height * 0.78 + cos(t * 9) * height * 0.04, min(width, height) * 0.13);

  for (let i = 0; i < 90; i++) {
    const sx = ((i * 127.1) % 1) * width;
    const sy = ((i * 73.7) % 1) * height;
    const tw = 0.35 + 0.65 * abs(sin(millis() * 0.0012 + i * 1.9));
    fill(theme.star[0], theme.star[1], theme.star[2], 200 * tw);
    circle(sx, sy, 1.2 + (i % 3) * 0.7);
  }

  drawStyleGroupAccent(group);
  drawRoundEventLayer(theme);
}

function drawStyleGroupAccent(group) {
  if (!group) return;
  const t = millis() * 0.001;
  noFill();
  if (group.name === "NEON DRIFT") {
    stroke(group.accent[0], group.accent[1], group.accent[2], 52);
    strokeWeight(2);
    for (let i = 0; i < 5; i++) {
      const y = height * (0.2 + i * 0.15) + sin(t * 2 + i * 1.1) * 10;
      line(0, y, width, y + 16);
    }
    return;
  }
  if (group.name === "STAR BLOOM") {
    stroke(group.accent[0], group.accent[1], group.accent[2], 44);
    strokeWeight(1.6);
    for (let i = 0; i < 28; i++) {
      const a = t + i * 0.23;
      const x = width * 0.5 + cos(a) * width * 0.34;
      const y = height * 0.5 + sin(a * 1.2) * height * 0.28;
      circle(x, y, 10 + (i % 4) * 5);
    }
    return;
  }
  if (group.name === "HYPERGATE") {
    stroke(group.accent[0], group.accent[1], group.accent[2], 42);
    strokeWeight(2);
    rectMode(CENTER);
    for (let i = 0; i < 4; i++) {
      const s = min(width, height) * (0.38 + i * 0.1) + sin(t * 1.5 + i) * 20;
      rect(width * 0.5, height * 0.5, s * 1.4, s * 0.85, 18);
    }
    rectMode(CORNER);
    return;
  }
  stroke(group.accent[0], group.accent[1], group.accent[2], 45);
  strokeWeight(1.8);
  for (let i = 0; i < 18; i++) {
    const x = ((i * 89.7 + millis() * 0.03) % (width + 120)) - 60;
    const y = ((i * 57.1 + millis() * 0.02) % (height + 120)) - 60;
    line(x - 10, y, x + 10, y);
    line(x, y - 10, x, y + 10);
  }
}

function currentBackgroundTheme() {
  const total = BG_THEMES.length;
  if (!total) return BG_THEMES[0];
  const group = currentStyleGroup();
  const offset = group ? group.bgOffset : 0;
  let idx = 0;
  if (game.state === "playing" || game.state === "round_result") {
    idx = (game.round + game.currentMinigameIndex + offset) % total;
  } else if (game.state === "results") {
    idx = (game.round + 1 + offset) % total;
  } else {
    idx = offset % total;
  }
  return BG_THEMES[(idx + total) % total];
}

function currentRoundEventIndex() {
  const eventCount = 6;
  const group = currentStyleGroup();
  const offset = group ? group.eventOffset : 0;
  if (game.state === "playing" || game.state === "round_result" || game.state === "results") {
    return (((game.round + offset) % eventCount) + eventCount) % eventCount;
  }
  const preview = floor(millis() / 10000);
  return (preview + offset) % eventCount;
}

function drawRoundEventLayer(theme) {
  const idx = currentRoundEventIndex();
  if (idx === 0) {
    drawEventComets(theme);
  } else if (idx === 1) {
    drawEventUfoParade(theme);
  } else if (idx === 2) {
    drawEventWormholes(theme);
  } else if (idx === 3) {
    drawEventCosmicCritters(theme);
  } else if (idx === 4) {
    drawEventMeteorDrift(theme);
  } else {
    drawEventSatellites(theme);
  }
}

function drawEventComets(theme) {
  const t = millis() * 0.16;
  strokeWeight(2.4);
  for (let i = 0; i < 8; i++) {
    const x = ((t + i * 210) % (width + 260)) - 130;
    const y = (i * 113 + millis() * 0.015) % (height + 120) - 60;
    stroke(theme.star[0], theme.star[1], theme.star[2], 85);
    line(x - 46, y - 22, x + 16, y + 8);
    noStroke();
    fill(theme.star[0], theme.star[1], theme.star[2], 145);
    circle(x + 18, y + 9, 4.8);
  }
}

function drawEventUfoParade(theme) {
  const t = millis() * 0.001;
  const c = theme.blobs[1];
  for (let i = 0; i < 5; i++) {
    const x = (width * (i + 0.5) / 5) + sin(t * 1.3 + i * 1.7) * 54;
    const y = height * 0.22 + cos(t * 1.6 + i * 2.1) * 26;
    noStroke();
    fill(c[0], c[1], c[2], 100);
    ellipse(x, y, 68, 26);
    fill(235, 245, 255, 140);
    ellipse(x, y - 8, 26, 16);
    fill(255, 255, 210, 80);
    triangle(x - 10, y + 10, x + 10, y + 10, x, y + 40);
  }
}

function drawEventWormholes(theme) {
  const t = millis() * 0.0014;
  const a = theme.blobs[0];
  const b = theme.blobs[2];
  const spots = [
    { x: width * 0.18, y: height * 0.68, c: a },
    { x: width * 0.78, y: height * 0.34, c: b }
  ];
  noFill();
  for (const s of spots) {
    for (let i = 0; i < 4; i++) {
      const r = 28 + i * 18 + sin(t * 2 + i) * 6;
      stroke(s.c[0], s.c[1], s.c[2], 48 - i * 8);
      strokeWeight(2);
      circle(s.x, s.y, r * 2);
    }
  }
}

function drawEventCosmicCritters(theme) {

function drawEventMeteorDrift(theme) {

function drawMapTransitionOverlay() {
  const startMs = game.ui.mapTransitionStartMs;
  if (!startMs) return;
  const elapsed = millis() - startMs;
  const duration = CONFIG.MAP_TRANSITION_MS;
  const t = constrain(elapsed / duration, 0, 1);
  if (t >= 1) {
    game.ui.mapTransitionStartMs = 0;
    return;
  }

  const pulse = sin(t * PI);
  const cx = width * game.ui.mapTransitionAnchorX;
  const cy = height * game.ui.mapTransitionAnchorY;
  const base = min(width, height);
  const styleCount = 4;
  const style = ((game.ui.mapTransitionStyleIndex % styleCount) + styleCount) % styleCount;

  noStroke();
  fill(4, 5, 12, 45 + 175 * pulse);
  rect(0, 0, width, height);

  if (style === 0) {
    drawTransitionBlackHole(t, pulse, cx, cy, base);
  } else if (style === 1) {
    drawTransitionWarpStreaks(t, pulse, cx, cy, base);
  } else if (style === 2) {
    drawTransitionGateIris(t, pulse, cx, cy, base);
  } else {
    drawTransitionNebulaCurtain(t, pulse, cx, cy, base);
  }

  fill(235, 245, 255, 160 * (1 - t));
  textAlign(CENTER, TOP);
  textSize(12);
  textStyle(700);
  text(transitionStyleName(style), width * 0.5, 18);
}

function drawTransitionBlackHole(t, pulse, cx, cy, base) {
  const p = 1 - pow(1 - t, 3);
  const coreR = base * (0.02 + pulse * 0.34);

  push();
  translate(cx, cy);
  rotate(-t * 1.8);
  noFill();
  for (let i = 0; i < 6; i++) {
    const r = coreR + i * base * 0.055;
    const alpha = (1 - i / 6) * 135 * (1 - t * 0.9);
    stroke(50, 240, 255, alpha);
    strokeWeight(2 + i * 0.4);
    arc(0, 0, r * 2, r * 2, i * 0.4, i * 0.4 + PI * 1.2);
    stroke(255, 172, 88, alpha * 0.8);
    arc(0, 0, r * 2.15, r * 2.15, i * 0.4 + PI * 1.1, i * 0.4 + PI * 1.8);
  }
  for (let i = 0; i < 30; i++) {
    const ang = (TWO_PI * i) / 30 + t * 4;
    const outer = base * (0.45 + (i % 5) * 0.04);
    const inner = coreR * 0.55;
    const x1 = cos(ang) * outer;
    const y1 = sin(ang) * outer;
    const x2 = cos(ang + 0.08) * inner;
    const y2 = sin(ang + 0.08) * inner;
    stroke(220, 245, 255, 34 + 110 * (1 - p));
    strokeWeight(1.4);
    line(x1, y1, x2, y2);
  }
  pop();

  noStroke();
  fill(2, 2, 6, 236);
  circle(cx, cy, coreR * 1.15);
  stroke(60, 245, 255, 160 * (1 - t));
  strokeWeight(3.2);
  noFill();
  circle(cx, cy, coreR * 1.35);
}

function drawTransitionWarpStreaks(t, pulse, cx, cy, base) {
  const focus = base * (0.04 + 0.14 * pulse);
  push();
  translate(cx, cy);
  rotate(0.45 + t * 1.6);
  for (let i = 0; i < 56; i++) {
    const ang = (TWO_PI * i) / 56;
    const outer = base * (0.52 + (i % 6) * 0.04);
    const inner = focus + (i % 4) * 3;
    const x1 = cos(ang) * outer;
    const y1 = sin(ang) * outer;
    const x2 = cos(ang + 0.05 * sin(t * 8 + i)) * inner;
    const y2 = sin(ang + 0.05 * sin(t * 8 + i)) * inner;
    stroke(70, 238, 255, 40 + 120 * (1 - t));
    strokeWeight(1 + (i % 3) * 0.6);
    line(x1, y1, x2, y2);
    if (i % 2 === 0) {
      stroke(255, 176, 92, 28 + 85 * (1 - t));
      strokeWeight(1.1);
      line(x1 * 0.85, y1 * 0.85, x2, y2);
    }
  }
  pop();

  noFill();
  stroke(94, 245, 255, 140 * (1 - t));
  strokeWeight(3);
  circle(cx, cy, focus * 2.8);
  stroke(255, 179, 103, 110 * (1 - t));
  circle(cx, cy, focus * 3.7);
}

function drawTransitionGateIris(t, pulse, cx, cy, base) {
  const close = sin(t * PI);
  const sideW = width * (0.02 + close * 0.23);
  const topH = height * (0.02 + close * 0.19);

  noStroke();
  fill(8, 11, 28, 220 * close);
  rect(0, 0, sideW, height);
  rect(width - sideW, 0, sideW, height);
  rect(0, 0, width, topH);
  rect(0, height - topH, width, topH);

  push();
  translate(cx, cy);
  rotate(-t * 2.1);
  noFill();
  const rings = 4;
  for (let i = 0; i < rings; i++) {
    const rr = base * (0.1 + i * 0.09 + close * 0.06);
    const alpha = (1 - i / rings) * (150 - t * 90);
    stroke(74, 244, 255, alpha);
    strokeWeight(2.4 - i * 0.3);
    beginShape();
    for (let j = 0; j < 6; j++) {
      const a = (TWO_PI * j) / 6;
      vertex(cos(a) * rr, sin(a) * rr);
    }
    endShape(CLOSE);
    stroke(255, 170, 86, alpha * 0.7);
    arc(0, 0, rr * 2.2, rr * 2.2, i * 0.8, i * 0.8 + PI * 0.9);
  }
  pop();

  const core = base * (0.04 + close * 0.12);
  noStroke();
  fill(28, 42, 74, 200);
  circle(cx, cy, core * 2);
  stroke(92, 244, 255, 120 * (1 - t));
  noFill();
  strokeWeight(2.8);
  circle(cx, cy, core * 2.4);
}

function drawTransitionNebulaCurtain(t, pulse, cx, cy, base) {
  const wave = sin(t * PI);
  const spread = base * (0.25 + wave * 0.42);
  const offsetX = width * (0.25 - wave * 0.18);
  const offsetY = height * (0.2 - wave * 0.15);

  noStroke();
  fill(65, 238, 255, 28 + 96 * wave);
  circle(cx - offsetX, cy - offsetY, spread * 1.9);
  fill(255, 170, 90, 24 + 90 * wave);
  circle(cx + offsetX * 0.96, cy + offsetY * 0.78, spread * 1.8);
  fill(152, 205, 255, 30 + 80 * wave);
  circle(cx - offsetX * 0.55, cy + offsetY * 0.92, spread * 1.35);
  fill(255, 214, 150, 22 + 72 * wave);
  circle(cx + offsetX * 0.68, cy - offsetY * 0.82, spread * 1.2);

  push();
  translate(cx, cy);
  rotate(t * 1.5);
  noFill();
  for (let i = 0; i < 5; i++) {
    const rr = base * (0.13 + i * 0.08 + wave * 0.07);
    stroke(92, 244, 255, (1 - i / 5) * 85);
    strokeWeight(1.8);
    ellipse(0, 0, rr * 2.2, rr * 1.25);
    stroke(255, 176, 92, (1 - i / 5) * 70);
    ellipse(0, 0, rr * 1.45, rr * 2.25);
  }
  pop();

  const core = base * (0.03 + pulse * 0.09);
  push();
  translate(cx, cy);
  rotate(t * 2.2);
  noStroke();
  fill(88, 234, 255, 130);
  beginShape();
  vertex(0, -core * 1.4);
  vertex(core * 1.05, 0);
  vertex(0, core * 1.4);
  vertex(-core * 1.05, 0);
  endShape(CLOSE);
  pop();
}

function connectWebSocket() {
  if (game.ws.socket) {
    try { game.ws.socket.close(); } catch (err) {}
  }

  try {
    const ws = new WebSocket(CONFIG.WS_URL);
    game.ws.socket = ws;

    ws.onopen = () => {
      game.ws.connected = true;
      game.ws.lastDataMs = millis();
    };

    ws.onmessage = (evt) => {
      handleWebSocketMessage(evt.data);
    };

    ws.onerror = () => {
      game.ws.connected = false;
    };

    ws.onclose = () => {
      game.ws.connected = false;
      scheduleReconnect();
    };
  } catch (err) {
    game.ws.connected = false;
    scheduleReconnect();
  }
}

function scheduleReconnect() {
  if (game.ws.reconnectTimer) {
    clearTimeout(game.ws.reconnectTimer);
  }
  game.ws.reconnectTimer = setTimeout(() => connectWebSocket(), 1000);
}

function handleWebSocketMessage(raw) {
  game.ws.packetCount++;
  game.ws.lastDataMs = millis();

  if (game.runtime.inputMode === "mouse") {
    return;
  }

  let payload;
  try {
    payload = JSON.parse(raw);
  } catch (err) {
    game.ws.parseErrors++;
    return;
  }

  const tags = normalizeTags(payload);
  for (const tag of tags) {
    const id = Number(tag.id ?? tag.tagId ?? tag.tag_id);
    if (!Number.isFinite(id)) continue;

    const playerKey = getPlayerKeyByTag(id);
    if (!playerKey) continue;

    const x = Number(tag.x ?? tag.posX ?? tag.pos_x);
    const y = Number(tag.y ?? tag.posY ?? tag.pos_y);
    if (!Number.isFinite(x) || !Number.isFinite(y)) continue;

    game.ws.lastTag = { id, x, y, ms: millis() };
    updatePlayerFromUWB(playerKey, x, y);
  }
}

function normalizeTags(payload) {
  if (Array.isArray(payload)) return payload;
  if (Array.isArray(payload.tags)) return payload.tags;
  if (payload.tag) return [payload.tag];
  if (payload.id !== undefined && payload.x !== undefined && payload.y !== undefined) return [payload];
  return [];
}

function getPlayerKeyByTag(id) {
  if (id === game.players.p1.tagId) return "p1";
  if (id === game.players.p2.tagId) return "p2";
  return null;
}

function effectiveUwbBounds(player) {
  const base = CONFIG.UWB_BOUNDS;
  const sharedBounds = player ? readSharedCalibrationBounds(player.tagId) : null;
  if (isValidBounds(sharedBounds)) return sharedBounds;
  const cornerBounds = player && player.hw && player.hw.cornerCal ? player.hw.cornerCal.bounds : null;
  if (cornerBounds && Number.isFinite(cornerBounds.xMin) && Number.isFinite(cornerBounds.xMax) && Number.isFinite(cornerBounds.yMin) && Number.isFinite(cornerBounds.yMax)) {
    return cornerBounds;
  }
  if (!player || !player.hw || !player.hw.calReady) return base;

  const hw = player.hw;
  const spanX = hw.maxX - hw.minX;
  const spanY = hw.maxY - hw.minY;
  if (spanX < CONFIG.HARDWARE.minCalSpanX || spanY < CONFIG.HARDWARE.minCalSpanY) return base;

  const mx = max(0.05, spanX * CONFIG.HARDWARE.calMarginRatio);
  const my = max(0.05, spanY * CONFIG.HARDWARE.calMarginRatio);
  const rawMinX = hw.minX - mx;
  const rawMaxX = hw.maxX + mx;
  const rawMinY = hw.minY - my;
  const rawMaxY = hw.maxY + my;
  const blend = CONFIG.HARDWARE.calBlend;

  return {
    xMin: lerp(base.xMin, rawMinX, blend),
    xMax: lerp(base.xMax, rawMaxX, blend),
    yMin: lerp(base.yMin, rawMinY, blend),
    yMax: lerp(base.yMax, rawMaxY, blend)
  };
}

function mapUWBToScreen(x, y, player = null) {
  const b = effectiveUwbBounds(player);
  const shared = player ? readSharedCalibrationBounds(player.tagId) : null;
  const hasCalibratedBounds = isValidBounds(shared) || (player && player.hw && player.hw.cornerCal && isValidBounds(player.hw.cornerCal.bounds));
  const padRaw = hasCalibratedBounds ? 0 : (CONFIG.HARDWARE.mapPadding ?? CONFIG.WORLD_PADDING);
  const pad = constrain(padRaw, 0, min(width, height) * 0.25);
  const px = map(x, b.xMin, b.xMax, pad, width - pad, true);
  const py = map(y, b.yMin, b.yMax, height - pad, pad, true);
  return { x: px, y: py };
}

function updatePlayerCalibration(player, uwbX, uwbY) {
  if (player.hw.cornerCal && player.hw.cornerCal.ready) return;
  const hw = player.hw;
  hw.sampleCount++;
  hw.minX = min(hw.minX, uwbX);
  hw.maxX = max(hw.maxX, uwbX);
  hw.minY = min(hw.minY, uwbY);
  hw.maxY = max(hw.maxY, uwbY);
  const spanX = hw.maxX - hw.minX;
  const spanY = hw.maxY - hw.minY;
  hw.calReady = hw.sampleCount >= CONFIG.HARDWARE.calMinSamples && spanX >= CONFIG.HARDWARE.minCalSpanX && spanY >= CONFIG.HARDWARE.minCalSpanY;
}

function pushRawSample(player, rawX, rawY) {
  const hw = player.hw;
  if (!hw.rawSamples) hw.rawSamples = [];
  hw.rawSamples.push({ x: rawX, y: rawY, ms: millis() });
  if (hw.rawSamples.length > 48) {
    hw.rawSamples.splice(0, hw.rawSamples.length - 48);
  }
}

function updatePlayerFromUWB(playerKey, uwbX, uwbY) {
  const p = game.players[playerKey];
  ensurePlayerFilters(p);
  pushRawSample(p, uwbX, uwbY);
  updatePlayerCalibration(p, uwbX, uwbY);
  const nowSec = millis() * 0.001;
  const screen = mapUWBToScreen(uwbX, uwbY, p);

  const filteredX = p.filters.x.filter(screen.x, nowSec);
  const filteredY = p.filters.y.filter(screen.y, nowSec);

  let targetX = filteredX;
  let targetY = filteredY;

  const alphaBase = CONFIG.HARDWARE.postFilterAlpha;
  const alphaMin = CONFIG.HARDWARE.minPostFilterAlpha;
  const alphaMax = CONFIG.HARDWARE.maxPostFilterAlpha;
  const fastMovePx = max(1, CONFIG.HARDWARE.fastMovePx);
  const boost = CONFIG.HARDWARE.fastMoveAlphaBoost;
  const jitterPx = max(0, CONFIG.HARDWARE.microJitterPx);
  const jitterBlend = CONFIG.HARDWARE.microJitterBlend;

  if (p.hw.smoothX === null || p.hw.smoothY === null) {
    p.hw.smoothX = targetX;
    p.hw.smoothY = targetY;
  } else {
    const travel = dist(p.hw.smoothX, p.hw.smoothY, targetX, targetY);
    if (travel < jitterPx) {
      targetX = lerp(p.hw.smoothX, targetX, jitterBlend);
      targetY = lerp(p.hw.smoothY, targetY, jitterBlend);
    }
    const moveRatio = constrain(travel / fastMovePx, 0, 1);
    const alpha = constrain(alphaBase + moveRatio * boost, alphaMin, alphaMax);
    p.hw.smoothX = lerp(p.hw.smoothX, targetX, alpha);
    p.hw.smoothY = lerp(p.hw.smoothY, targetY, alpha);
  }

  const now = millis();
  if (p.screenX !== null && p.screenY !== null && p.lastUpdateMs > 0) {
    const dtFrames = max(1, (now - p.lastUpdateMs) / 16.666);
    const vx = (p.hw.smoothX - p.screenX) / dtFrames;
    const vy = (p.hw.smoothY - p.screenY) / dtFrames;
    p.velocity.x = lerp(p.velocity.x, vx, CONFIG.HARDWARE.velocityBlend);
    p.velocity.y = lerp(p.velocity.y, vy, CONFIG.HARDWARE.velocityBlend);
  }

  p.screenX = p.hw.smoothX;
  p.screenY = p.hw.smoothY;
  p.rawX = uwbX;
  p.rawY = uwbY;
  p.active = true;
  p.lastUpdateMs = now;
  p.hw.lastPredictMs = now;
}

function updateDemoMode() {
  const mode = game.runtime.inputMode;
  if (game.runtime.botAssist) {
    game.demo.enabled = true;
  } else if (mode === "mouse") {
    game.demo.enabled = true;
  } else if (mode === "tag") {
    game.demo.enabled = false;
  } else if (game.demo.forced) {
    game.demo.enabled = true;
  } else {
    const noData = millis() - game.ws.lastDataMs > CONFIG.DEMO_TIMEOUT_MS;
    game.demo.enabled = !game.ws.connected || noData;
  }

  if (!game.demo.enabled) return;

  const p1 = game.players.p1;
  ensurePlayerFilters(p1);

  const startX = p1.screenX === null ? width * 0.5 : p1.screenX;
  const startY = p1.screenY === null ? height * 0.5 : p1.screenY;
  let mx;
  let my;

  if (game.runtime.botAssist) {
    const botTarget = getBotAssistTarget(startX, startY);
    const effDifficulty = game.runtime.currentDifficulty || getEffectiveDifficulty();
    const speed = CONFIG.BOT_SPEED_PX + Math.max(0, effDifficulty - 1) * 8;
    const moved = moveToward(startX, startY, botTarget.x, botTarget.y, speed);
    mx = constrain(moved.x, 0, width);
    my = constrain(moved.y, 0, height);
  } else {
    // Keep mouse control snappy for playtesting.
    mx = constrain(mouseX, 0, width);
    my = constrain(mouseY, 0, height);
  }
  const nowSec = millis() * 0.001;

  if (game.runtime.botAssist) {
    // Keep bot response immediate enough for high-density hazard rounds.
    p1.screenX = lerp(startX, mx, 0.84);
    p1.screenY = lerp(startY, my, 0.84);
  } else {
    p1.screenX = mx;
    p1.screenY = my;
  }
  p1.velocity.x = lerp(p1.velocity.x, p1.screenX - startX, 0.45);
  p1.velocity.y = lerp(p1.velocity.y, p1.screenY - startY, 0.45);
  p1.active = true;
  p1.lastUpdateMs = millis();

  const p2 = game.players.p2;
  if (millis() - p2.lastUpdateMs > CONFIG.DEMO_TIMEOUT_MS || mode === "mouse") {
    p2.active = false;
  }
}

function applyHardwareDropoutFallback() {
  if (game.demo.enabled) return;
  if (game.runtime.inputMode !== "tag" && game.runtime.inputMode !== "auto") return;

  const now = millis();
  for (const key of ["p1", "p2"]) {
    const p = game.players[key];
    if (p.screenX === null || p.screenY === null) continue;
    if (p.lastUpdateMs <= 0) continue;

    const staleMs = now - p.lastUpdateMs;
    if (staleMs <= CONFIG.HARDWARE.dropoutGraceMs) {
      p.hw.lastPredictMs = now;
      continue;
    }
    if (staleMs > CONFIG.HARDWARE.dropoutHoldMs) {
      continue;
    }

    const lastPred = p.hw.lastPredictMs || p.lastUpdateMs;
    const dt = max(0, now - lastPred);
    p.hw.lastPredictMs = now;
    if (dt <= 0) continue;

    const step = min(CONFIG.HARDWARE.maxPredictPxPerFrame, dt / 16.666);
    p.screenX = constrain(p.screenX + p.velocity.x * step, 0, width);
    p.screenY = constrain(p.screenY + p.velocity.y * step, 0, height);
    p.velocity.x *= CONFIG.HARDWARE.predictDamping;
    p.velocity.y *= CONFIG.HARDWARE.predictDamping;
    p.active = true;
  }
}

function pruneStalePlayers() {
  const now = millis();
  for (const key of ["p1", "p2"]) {
    const p = game.players[key];
    if (!p.active) continue;

    if (game.demo.enabled && key === "p1") {
      continue;
    }
    if (game.twoPlayerMode && key === "p2") {
      if (now - p.lastUpdateMs > CONFIG.PLAYER_ACTIVE_TIMEOUT_MS) p.active = false;
      continue;
    }
    if (key === "p2" && !game.twoPlayerMode) {
      p.active = false;
      continue;
    }

    if (now - p.lastUpdateMs > CONFIG.PLAYER_ACTIVE_TIMEOUT_MS) {
      p.active = false;
    }
  }
}

function renderGameToText() {
  const activePlayers = activePlayersForMode().map((p) => ({
    label: p.label,
    x: p.screenX,
    y: p.screenY,
    active: p.active
  }));
  const mg = currentMinigame();
  const g = currentStyleGroup();
  const payload = {
    coordinate_system: "origin=(top-left), +x right, +y down, pixels",
    state: game.state,
    score: game.score,
    lives: game.lives,
    round: game.round + 1,
    difficulty: Number(game.difficulty.toFixed(3)),
    effective_difficulty: Number((game.runtime.currentDifficulty || game.difficulty).toFixed(3)),
    two_player_mode: game.twoPlayerMode,
    input_mode: game.runtime.inputMode,
    bot_assist: game.runtime.botAssist,
    style_group: g ? g.name : null,
    transition_style: transitionStyleName(game.ui.mapTransitionStyleIndex),
    hardware: {
      p1_cal_samples: game.players.p1.hw.sampleCount,
      p2_cal_samples: game.players.p2.hw.sampleCount,
      p1_cal_ready: game.players.p1.hw.calReady,
      p2_cal_ready: game.players.p2.hw.calReady,
      p1_corner_cal_active: game.players.p1.hw.cornerCal.active,
      p1_corner_cal_ready: game.players.p1.hw.cornerCal.ready,
      p1_corner_cal_step: game.players.p1.hw.cornerCal.step,
      p2_corner_cal_active: game.players.p2.hw.cornerCal.active,
      p2_corner_cal_ready: game.players.p2.hw.cornerCal.ready,
      p2_corner_cal_step: game.players.p2.hw.cornerCal.step,
      dropout_grace_ms: CONFIG.HARDWARE.dropoutGraceMs,
      dropout_hold_ms: CONFIG.HARDWARE.dropoutHoldMs
    },
    expected_tag_ids: { p1: game.players.p1.tagId, p2: game.players.p2.tagId },
    websocket_connected: game.ws.connected,
    demo_enabled: game.demo.enabled,
    websocket_packet_count: game.ws.packetCount,
    minigame: mg ? mg.name : null,
    boss_mix_active: isBossMixActive(),
    players: activePlayers
  };
  if (game.ws.lastTag) {
    payload.last_tag = {
      id: game.ws.lastTag.id,
      x: Number(game.ws.lastTag.x.toFixed(3)),
      y: Number(game.ws.lastTag.y.toFixed(3))
    };
  }
  return JSON.stringify(payload);
}

function updatePlayersTrails() {
  for (const key of ["p1", "p2"]) {
    const p = game.players[key];
    if (!p.active || p.screenX === null || p.screenY === null) continue;
    p.trail.unshift({ x: p.screenX, y: p.screenY });
    if (p.trail.length > CONFIG.CURSOR.trailLength) {
      p.trail.length = CONFIG.CURSOR.trailLength;
    }
  }
}

function activePlayersForMode() {
  const list = [];
  if (game.players.p1.active) list.push(game.players.p1);
  if (game.twoPlayerMode && game.players.p2.active) list.push(game.players.p2);
  return list;
}

function isUwbControlActive() {
  const p = game.players.p1;
  return !game.demo.enabled && p.active && p.screenX !== null && p.screenY !== null;
}

function drawCursors() {
  const players = activePlayersForMode();
  for (const p of players) {
    if (p.screenX === null || p.screenY === null) continue;
    drawCursorTrail(p);
    drawCursorGlow(p);

    noStroke();
    fill(p.color[0], p.color[1], p.color[2], 220);
    circle(p.screenX, p.screenY, CONFIG.CURSOR.size);

    fill(255, 180);
    circle(p.screenX, p.screenY, CONFIG.CURSOR.size * 0.35);

    if (game.twoPlayerMode) {
      fill(p.color[0], p.color[1], p.color[2], 220);
      textAlign(CENTER, BOTTOM);
      textSize(12);
      textStyle(600);
      text(p.label, p.screenX, p.screenY - CONFIG.CURSOR.size * 0.9);
      textStyle(NORMAL);
    }

    if (p.hoverActive) {
      const pulse = CONFIG.CURSOR.size * (1.4 + game.runtime.hoverPulse * 0.6);
      noFill();
      stroke(p.color[0], p.color[1], p.color[2], 120);
      strokeWeight(2);
      circle(p.screenX, p.screenY, pulse);
    }
  }
}

function drawCursorTrail(player) {
  const tlen = player.trail.length;
  for (let i = tlen - 1; i >= 0; i--) {
    const pt = player.trail[i];
    const n = i / Math.max(1, tlen - 1);
    const size = lerp(4, CONFIG.CURSOR.size, 1 - n);
    const baseAlpha = player.label === "P2" ? 150 : 180;
    const alpha = lerp(0, baseAlpha, 1 - n);
    noStroke();
    fill(player.color[0], player.color[1], player.color[2], alpha * 0.35);
    circle(pt.x, pt.y, size);
  }
}

function drawCursorGlow(player) {
  const layers = 12;
  const maxR = CONFIG.CURSOR.size * 1.25;
  for (let i = layers; i >= 1; i--) {
    const r = map(i, 1, layers, maxR * 0.55, maxR * 2.5);
    const alpha = map(i, 1, layers, 30, 1);
    noStroke();
    fill(player.color[0], player.color[1], player.color[2], alpha);
    circle(player.screenX, player.screenY, r);
  }
}

function getCursorCollisionRadius(player) {
  let r = CONFIG.CURSOR.size * 0.5;
  if (game.runtime.botAssist && player && player.label === "P1") {
    r *= CONFIG.BOT_HITBOX_SCALE;
  }
  return r;
}

function cursorOverlapsCircle(player, x, y, radius) {
  if (!player.active || player.screenX === null || player.screenY === null) return false;
  return dist(player.screenX, player.screenY, x, y) < radius + getCursorCollisionRadius(player);
}

function anyPlayerOverlapsCircle(x, y, radius) {
  let hover = false;
  for (const p of activePlayersForMode()) {
    const hit = cursorOverlapsCircle(p, x, y, radius);
    p.hoverActive = p.hoverActive || hit;
    hover = hover || hit;
  }
  return hover;
}

function resetHoverFlags() {
  game.players.p1.hoverActive = false;
  game.players.p2.hoverActive = false;
}

function keyPressed() {
  if (key === " " && game.state === "menu") {
    startCountdown();
  } else if (key === " " && game.state === "results") {
    resetGameState();
    game.state = "menu";
  }

  if (key === "d" || key === "D") {
    game.demo.forced = !game.demo.forced;
  }

  if (key === "i" || key === "I") {
    cycleInputMode();
  }

  if (key === "b" || key === "B") {
    game.runtime.botAssist = !game.runtime.botAssist;
  }

  if (key === "r" || key === "R") {
    resetGameState();
    game.state = "menu";
  }

  if (key === "z" || key === "Z") {
    handleCalibrationAction();
  }

  if ((key === "2") && game.state === "menu" && game.players.p2.active) {
    game.twoPlayerMode = !game.twoPlayerMode;
  }

  if (key === "Escape") {
    window.location.href = withRuntimeQuery("game_menu.html");
  }
}

function currentMinigame() {
  const idx = game.minigameOrder[game.currentMinigameIndex];
  return minigames[idx] || null;
}

function updateAndDrawPlayingState() {
  resetHoverFlags();

  const mg = currentMinigame();
  if (!mg) {
    game.state = "results";
    game.ui.resultStartMs = millis();
    return;
  }

  drawMinigameBackgroundTint(mg.color);

  const effectiveDifficulty = game.runtime.currentDifficulty || getEffectiveDifficulty();
  const uwbDurationAssist = isUwbControlActive() ? CONFIG.HARDWARE.uwbDurationAssist : 1;
  const adjustedDuration = mg.duration ? (mg.duration * uwbDurationAssist) / sqrt(effectiveDifficulty) : null;
  if (adjustedDuration && millis() - game.minigameStartMs >= adjustedDuration) {
    const timeout = getMinigameTimeoutResult(mg, effectiveDifficulty);
    endMinigame(timeout.success, timeout.points);
    return;
  }

  const bossMixResult = updateBossMixOverlay(activePlayersForMode(), effectiveDifficulty);
  if (bossMixResult && bossMixResult.fail) {
    triggerFlash(CONFIG.COLORS.red, 280, 115);
    triggerShake(8, 260);
    spawnImpactRing(bossMixResult.x, bossMixResult.y, CONFIG.COLORS.red, 14, 220, 280, 3.6);
    endMinigame(false, 0);
    return;
  }

  const result = mg.update(activePlayersForMode(), effectiveDifficulty);
  if (result && result.done) {
    endMinigame(result.success, result.points || 0);
    return;
  }

  mg.draw();
  drawBossMixOverlay();
  drawHUD(mg, adjustedDuration, effectiveDifficulty);
}

function getMinigameTimeoutResult(mg, difficulty) {
  if (typeof mg.onTimeout === "function") {
    const out = mg.onTimeout(difficulty) || {};
    return {
      success: out.success !== false,
      points: Number(out.points || 0)
    };
  }
  return {
    success: true,
    points: mg.getPoints ? Number(mg.getPoints() || 0) : 0
  };
}

function endMinigame(success, points) {
  const mg = currentMinigame();
  let callout = "";
  game.ui.lastResult = {
    success,
    points,
    name: mg ? mg.name : "ROUND",
    callout: ""
  };

  if (success) {
    game.score += points;
    game.stats.minigamesSurvived++;
    game.stats.successStreak++;
    game.stats.bestStreak = max(game.stats.bestStreak, game.stats.successStreak);
    callout = random(ROUND_SUCCESS_CALLOUTS);
    if (game.stats.successStreak >= 3) {
      callout = `Streak x${game.stats.successStreak}`;
      addFloatingScore(width * 0.5, height * 0.3, callout, CONFIG.COLORS.cyan);
    }
    triggerFlash(CONFIG.COLORS.green, 260, 90);
    spawnImpactRing(width * 0.5, height * 0.5, CONFIG.COLORS.green, 30, min(width, height) * 0.42, 320, 3.6);
    if (points > 0) {
      addFloatingScore(width * 0.5, height * 0.43, `+${points}`, CONFIG.COLORS.green);
    }
  } else {
    game.stats.successStreak = 0;
    callout = random(ROUND_FAIL_CALLOUTS);
    game.lives--;
    triggerFlash(CONFIG.COLORS.red, 320, 120);
    triggerShake(9, 300);
    spawnImpactRing(width * 0.5, height * 0.5, CONFIG.COLORS.red, 24, min(width, height) * 0.5, 390, 4.4);
  }
  game.ui.lastResult.callout = callout;
  adjustDifficultyDirector(success);

  if (game.lives <= 0) {
    game.ui.finalMessage = random(DEATH_MESSAGES);
    game.state = "results";
    game.ui.resultStartMs = millis();
  } else {
    game.state = "round_result";
    game.ui.roundResultStartMs = millis();
  }
}

function clipTextToWidth(value, maxWidth) {
  const src = String(value || "");
  if (!src) return "";
  if (textWidth(src) <= maxWidth) return src;
  let out = src;
  while (out.length > 1 && textWidth(out + "...") > maxWidth) {
    out = out.slice(0, -1);
  }
  return out + "...";
}

function drawTimerBar(remaining, themeColor) {
  const y = height - 6;
  noStroke();
  fill(255, 25);
  rect(0, y, width, 6);

  let c = themeColor;

function getEffectiveDifficulty() {
  const minMult = CONFIG.GAMEPLAY.directorMinMult;
  const maxMult = CONFIG.GAMEPLAY.directorMaxMult;
  const mult = constrain(game.runtime.difficultyMod, minMult, maxMult);
  const uwbAssist = isUwbControlActive() ? 0.82 : 1;
  return max(0.9, game.difficulty * mult * uwbAssist);
}

function adjustDifficultyDirector(success) {
  if (success) {
    const streakBonus = min(0.03, game.stats.successStreak * 0.0045);
    game.runtime.difficultyMod += CONFIG.GAMEPLAY.directorWinStep + streakBonus;
  } else {
    const roundPenalty = min(0.035, game.round * 0.006);
    game.runtime.difficultyMod -= CONFIG.GAMEPLAY.directorFailStep + roundPenalty;
  }
  game.runtime.difficultyMod = constrain(
    game.runtime.difficultyMod,
    CONFIG.GAMEPLAY.directorMinMult,
    CONFIG.GAMEPLAY.directorMaxMult
  );
}

function shouldEnableBossMix(roundNumber, minigameIndex) {
  if (roundNumber < CONFIG.GAMEPLAY.bossMixUnlockRound) return false;
  const cadence = max(2, floor(CONFIG.GAMEPLAY.bossMixCadence));
  const key = roundNumber * 11 + minigameIndex * 7;
  return key % cadence === 0;
}

function setupBossMixForCurrentMinigame(difficulty) {
  const active = shouldEnableBossMix(game.round + 1, game.currentMinigameIndex);
  game.mini.bossMix = {
    active,
    hazards: [],
    pattern: random(["meteor", "cross", "orbit"]),
    spawnInterval: max(290, 880 / pow(max(1, difficulty), 0.76)),
    spawnMs: millis() + random(180, 420),
    maxHazards: max(4, floor(4 + difficulty * 0.9)),
    warningMs: millis() + 760
  };
  if (!active) return;
  triggerFlash(CONFIG.COLORS.red, 190, 58);
  addFloatingScore(width * 0.5, height * 0.2, "BOSS MIX", CONFIG.COLORS.red);
}

function isBossMixActive() {
  return Boolean(game.mini?.bossMix?.active);
}

function spawnBossMixHazard(mix, difficulty) {
  const edge = floor(random(4));
  let x = width * 0.5;
  let y = height * 0.5;
  const margin = 48;
  if (edge === 0) {
    x = random(20, width - 20);
    y = -margin;
  } else if (edge === 1) {
    x = width + margin;
    y = random(20, height - 20);
  } else if (edge === 2) {
    x = random(20, width - 20);
    y = height + margin;
  } else {
    x = -margin;
    y = random(20, height - 20);
  }

  const tx = width * random(0.22, 0.78);
  const ty = height * random(0.24, 0.82);
  const dx = tx - x;
  const dy = ty - y;
  const len = Math.hypot(dx, dy) || 1;
  const speed = random(2.4, 5.1) * pow(max(1, difficulty), 0.4);
  const vx = (dx / len) * speed;
  const vy = (dy / len) * speed;
  return {
    x,
    y,
    vx,
    vy,
    radius: random(16, 28),
    bornMs: millis(),
    spin: random(-0.08, 0.08),
    theta: random(TWO_PI),
    pattern: mix.pattern
  };
}

function updateBossMixOverlay(players, difficulty) {
  const mix = game.mini?.bossMix;
  if (!mix || !mix.active) return null;
  const now = millis();

  while (now >= mix.spawnMs) {
    mix.spawnMs += mix.spawnInterval;
    mix.hazards.push(spawnBossMixHazard(mix, difficulty));
    if (mix.hazards.length > mix.maxHazards) {
      mix.hazards.splice(0, mix.hazards.length - mix.maxHazards);
    }
  }

  for (let i = mix.hazards.length - 1; i >= 0; i--) {
    const h = mix.hazards[i];
    h.theta += h.spin;
    if (h.pattern === "orbit") {
      h.vx += cos(h.theta) * 0.05;
      h.vy += sin(h.theta) * 0.05;
    } else if (h.pattern === "cross") {
      h.vx += sin(h.theta * 1.2) * 0.03;
      h.vy += cos(h.theta * 1.2) * 0.03;
    }
    const v = Math.hypot(h.vx, h.vy);
    const maxV = 6.6 + difficulty * 0.35;
    if (v > maxV) {
      h.vx = (h.vx / v) * maxV;
      h.vy = (h.vy / v) * maxV;
    }
    h.x += h.vx;
    h.y += h.vy;

    if (h.x < -90 || h.x > width + 90 || h.y < -90 || h.y > height + 90) {
      mix.hazards.splice(i, 1);
      continue;
    }

    for (const p of players) {
      if (!p.active || p.screenX === null || p.screenY === null) continue;
      const rr = getCursorCollisionRadius(p) + h.radius * 0.8;
      if (dist(p.screenX, p.screenY, h.x, h.y) <= rr) {
        p.hoverActive = true;
        return { fail: true, x: h.x, y: h.y };
      }
    }
  }
  return null;
}

function drawBossMixOverlay() {
  const mix = game.mini?.bossMix;
  if (!mix || !mix.active) return;

  for (const h of mix.hazards) {
    const pulse = 1 + sin((millis() - h.bornMs) * 0.012) * 0.15;
    drawTargetGlow(h.x, h.y, h.radius * 0.9 * pulse, CONFIG.COLORS.red, 145);

    push();
    translate(h.x, h.y);
    rotate(h.theta);
    noStroke();
    fill(CONFIG.COLORS.red[0], CONFIG.COLORS.red[1], CONFIG.COLORS.red[2], 228);
    circle(0, 0, h.radius * 1.7);
    stroke(255, 188);
    strokeWeight(2);
    line(-h.radius * 0.55, -h.radius * 0.55, h.radius * 0.55, h.radius * 0.55);
    line(h.radius * 0.55, -h.radius * 0.55, -h.radius * 0.55, h.radius * 0.55);
    pop();
  }

  if (millis() < mix.warningMs) {
    textAlign(CENTER, CENTER);
    textStyle(900);
    textSize(24);
    fill(CONFIG.COLORS.red[0], CONFIG.COLORS.red[1], CONFIG.COLORS.red[2], 220);
    text("BOSS MIX", width * 0.5, 98);
  }
}

function selectNextTransitionStyle() {
  let seq = TRANSITION_STYLE_SEQUENCE_RARE;
  const g = currentStyleGroup();
  if (g && Array.isArray(g.transitionSequence) && g.transitionSequence.length) {
    seq = g.transitionSequence;
  }
  if (!seq.length) {
    seq = TRANSITION_STYLE_SEQUENCE_CLEAN;
  }
  const seqIndex = game.ui.mapTransitionStep % seq.length;
  let nextStyle = seq[seqIndex];
  game.ui.mapTransitionStep++;
  if (nextStyle === game.ui.mapTransitionStyleIndex) {
    nextStyle = seq[game.ui.mapTransitionStep % seq.length];
    game.ui.mapTransitionStep++;
  }
  return nextStyle;
}

function advanceToNextMinigame() {
  game.currentMinigameIndex++;
  if (game.currentMinigameIndex >= game.minigameOrder.length) {
    game.currentMinigameIndex = 0;
    game.round++;
    game.stats.roundsCompleted++;
    game.difficulty = 1 + game.round * CONFIG.GAMEPLAY.difficultyPerRound;
    game.runtime.difficultyMod = min(CONFIG.GAMEPLAY.directorMaxMult, game.runtime.difficultyMod + 0.02);
    game.minigameOrder = shuffle([...Array(minigames.length).keys()]);
    if (game.lives < CONFIG.GAMEPLAY.maxLives) game.lives++;
  }
  game.ui.mapTransitionStyleIndex = selectNextTransitionStyle();
  game.ui.mapTransitionAnchorX = random(0.35, 0.65);
  game.ui.mapTransitionAnchorY = random(0.34, 0.66);
  game.ui.mapTransitionStartMs = millis();
  startMinigameAtIndex(game.currentMinigameIndex);
}

function resetPlayerCalibration(player) {
  player.hw.sampleCount = 0;
  player.hw.minX = Infinity;
  player.hw.maxX = -Infinity;
  player.hw.minY = Infinity;
  player.hw.maxY = -Infinity;
  player.hw.calReady = false;
}

function beginCornerCalibration(player = game.players.p1) {
  const cal = player.hw.cornerCal;
  cal.active = true;
  cal.ready = false;
  cal.step = 0;
  cal.points = { bl: null, br: null, tl: null, tr: null };
  cal.bounds = null;
  cal.lastCaptureMs = millis();
  player.hw.smoothX = null;
  player.hw.smoothY = null;
  player.velocity.x = 0;
  player.velocity.y = 0;
  resetPlayerCalibration(player);
  triggerFlash(CONFIG.COLORS.amber, 180, 76);
}

function averageRecentRawSample(player) {
  const samples = player.hw.rawSamples || [];
  if (!samples.length) return null;
  const now = millis();
  const maxAge = CONFIG.HARDWARE.cornerCaptureWindowMs;
  const recent = samples.filter((s) => now - s.ms <= maxAge);
  const pick = recent.length ? recent : samples;
  if (!pick.length) return null;
  let sx = 0;
  let sy = 0;
  for (const s of pick) {
    sx += s.x;
    sy += s.y;
  }
  return { x: sx / pick.length, y: sy / pick.length };
}

function finalizeCornerCalibration(player = game.players.p1) {
  const cal = player.hw.cornerCal;
  const { bl, br, tl, tr } = cal.points;
  if (!bl || !br || !tl || !tr) return false;

  const left = (bl.x + tl.x) * 0.5;
  const right = (br.x + tr.x) * 0.5;
  const bottom = (bl.y + br.y) * 0.5;
  const top = (tl.y + tr.y) * 0.5;

  let xMin = min(left, right);
  let xMax = max(left, right);
  let yMin = min(bottom, top);
  let yMax = max(bottom, top);

  const spanX = xMax - xMin;
  const spanY = yMax - yMin;
  if (spanX < CONFIG.HARDWARE.minCalSpanX || spanY < CONFIG.HARDWARE.minCalSpanY) {
    triggerFlash(CONFIG.COLORS.red, 210, 95);
    return false;
  }

  const mx = max(0.01, spanX * CONFIG.HARDWARE.cornerBoundsMarginRatio);
  const my = max(0.01, spanY * CONFIG.HARDWARE.cornerBoundsMarginRatio);
  xMin -= mx;
  xMax += mx;
  yMin -= my;
  yMax += my;

  cal.bounds = { xMin, xMax, yMin, yMax };
  writeSharedCalibrationBounds(player.tagId, cal.bounds);
  cal.ready = true;
  cal.active = false;
  cal.step = ROOM_CALIBRATION_STEPS.length;
  cal.lastCaptureMs = millis();
  player.hw.smoothX = null;
  player.hw.smoothY = null;
  resetPlayerCalibration(player);
  triggerFlash(CONFIG.COLORS.green, 220, 90);
  return true;
}

function captureCornerStep(player = game.players.p1) {
  const cal = player.hw.cornerCal;
  if (!cal.active) return false;
  const stepInfo = ROOM_CALIBRATION_STEPS[cal.step];
  if (!stepInfo) return finalizeCornerCalibration(player);

  const avg = averageRecentRawSample(player);
  if (!avg) {
    triggerFlash(CONFIG.COLORS.red, 180, 80);
    return false;
  }
  cal.points[stepInfo.key] = avg;
  cal.lastCaptureMs = millis();
  cal.step++;

  if (player.screenX !== null && player.screenY !== null) {
    emitParticles(player.screenX, player.screenY, CONFIG.COLORS.cyan, 10, 4.5);
  }
  if (cal.step >= ROOM_CALIBRATION_STEPS.length) {
    return finalizeCornerCalibration(player);
  }
  triggerFlash(CONFIG.COLORS.cyan, 150, 70);
  return true;
}

function handleCalibrationAction() {
  const p = game.players.p1;

  const cal = p.hw.cornerCal;
  if (!cal.active) {
    beginCornerCalibration(p);
    return;
  }
  captureCornerStep(p);
}

function hudControlButtons() {

function pointInRect(x, y, rectObj) {
  return x >= rectObj.x && x <= rectObj.x + rectObj.w && y >= rectObj.y && y <= rectObj.y + rectObj.h;
}

function cursorOverlapsRect(player, rectObj) {
  if (!player.active || player.screenX === null || player.screenY === null) return false;
  const nx = constrain(player.screenX, rectObj.x, rectObj.x + rectObj.w);
  const ny = constrain(player.screenY, rectObj.y, rectObj.y + rectObj.h);
  return dist(player.screenX, player.screenY, nx, ny) <= getCursorCollisionRadius(player);
}

function inputModeLabel(mode) {
  if (mode === "mouse") return "MOUSE";
  if (mode === "tag") return "TAG ONLY";
  return "AUTO";
}

function moveToward(x, y, tx, ty, stepMax) {
  const dx = tx - x;
  const dy = ty - y;
  const d = Math.hypot(dx, dy);
  if (d < 0.001) return { x, y };
  const step = Math.min(stepMax, d);
  const k = step / d;
  return { x: x + dx * k, y: y + dy * k };
}

function segmentPointDistance(ax, ay, bx, by, px, py) {
  const vx = bx - ax;
  const vy = by - ay;
  const wx = px - ax;
  const wy = py - ay;
  const len2 = vx * vx + vy * vy;
  if (len2 < 1e-6) return dist(ax, ay, px, py);
  const t = constrain((wx * vx + wy * vy) / len2, 0, 1);
  const cx = ax + vx * t;
  const cy = ay + vy * t;
  return dist(cx, cy, px, py);
}

function getBotAssistTarget(currentX, currentY) {
  if (game.state !== "playing") {
    return {
      x: width * 0.5 + Math.sin(millis() * 0.0014) * width * 0.25,
      y: height * 0.54 + Math.cos(millis() * 0.0018) * height * 0.2
    };
  }

  const mg = currentMinigame();
  if (!mg) return { x: currentX, y: currentY };
  const m = game.mini || {};
  const now = millis();

  if (mg.name === "TAP TARGETS") {
    const live = (m.targets || []).filter(t => !t.popping);
    if (live.length) {
      live.sort((a, b) => {
        const da = dist(currentX, currentY, a.x, a.y) * 0.25 + (a.lifeMs - (now - a.birthMs));
        const db = dist(currentX, currentY, b.x, b.y) * 0.25 + (b.lifeMs - (now - b.birthMs));
        return da - db;
      });
      return { x: live[0].x, y: live[0].y };
    }
  }

  if (mg.name === "DODGE") {
    const lookaheadBase = CONFIG.BOT_EXTRA_LOOKAHEAD_MS * (1 + (game.runtime.currentDifficulty || game.difficulty) * 0.2);
    const obstacles = m.obstacles || [];
    const sweepObstacles = obstacles.filter(o => o.kind === "sweep");
    if (sweepObstacles.length >= max(1, floor(obstacles.length * 0.45))) {
      const laneCount = 5;
      let bestLane = 2;
      let bestLaneScore = -Infinity;
      const anchorX = width * 0.5;
      for (let lane = 0; lane < laneCount; lane++) {
        const laneY = map(lane + 0.5, 0, laneCount, 96, height - 96);
        let score = -abs(laneY - currentY) * 0.24;
        for (const o of sweepObstacles) {
          for (let step = 1; step <= 4; step++) {
            const frames = (lookaheadBase * (step / 4)) / 16.666;
            const fx = o.x + (o.vx || 0) * frames;
            const fy = o.y;
            const dx = abs(anchorX - fx) - (o.w * 0.5 + CONFIG.CURSOR.size * 0.35);
            const dy = abs(laneY - fy) - (o.h * 0.5 + CONFIG.CURSOR.size * 0.38);
            const laneDanger = max(0, 170 - Math.hypot(max(0, dx), max(0, dy)) * 1.55);
            score -= laneDanger * (1 + step * 0.25);
          }
        }
        if (score > bestLaneScore) {
          bestLaneScore = score;
          bestLane = lane;
        }
      }
      return {
        x: width * 0.5,
        y: map(bestLane + 0.5, 0, laneCount, 96, height - 96)
      };
    }

    let best = { x: width * 0.5, y: height * 0.56 };
    let bestScore = -Infinity;
    for (let x = 84; x <= width - 84; x += 26) {
      for (let y = 96; y <= height - 86; y += 24) {
        let score = 0;
        for (const o of (m.obstacles || [])) {
          for (let step = 1; step <= 4; step++) {
            const lookahead = lookaheadBase * (step / 4);
            const frames = lookahead / 16.666;
            const futureX = o.x + (o.vx || 0) * frames;
            const futureY = o.y + (o.speed || 0) * frames;
            const clearanceX = Math.abs(x - futureX) - (o.w * 0.5 + CONFIG.CURSOR.size * 0.38);
            const clearanceY = Math.abs(y - futureY) - (o.h * 0.5 + CONFIG.CURSOR.size * 0.38);
            const overlap = clearanceX < 0 && clearanceY < 0;
            const edgeDistance = Math.hypot(Math.max(0, clearanceX), Math.max(0, clearanceY));
            const danger = overlap ? 320 : Math.max(0, 190 - edgeDistance * 1.7);
            score -= danger * (1 + step * 0.26);
          }
        }
        score -= Math.abs(x - currentX) * 0.022;
        score -= Math.abs(y - currentY) * 0.018;
        score -= Math.abs(x - width * 0.5) * 0.004;
        if (score > bestScore) {
          bestScore = score;
          best = { x, y };
        }
      }
    }
    return best;
  }

  if (mg.name === "WHACK-A-MOLE") {
    const active = (m.cells || []).filter(c => c.active);
    if (active.length) {
      active.sort((a, b) => {
        const ta = now - a.activeMs;
        const tb = now - b.activeMs;
        const sa = ta * 1.2 - dist(currentX, currentY, a.x, a.y) * 0.32;
        const sb = tb * 1.2 - dist(currentX, currentY, b.x, b.y) * 0.32;
        return sb - sa;
      });
      return { x: active[0].x, y: active[0].y };
    }
  }

  if (mg.name === "RED LIGHT GREEN LIGHT") {
    if (m.phase === "green") {
      const cps = m.checkpoints || [];
      const baseIdx = constrain(m.progressIdx?.p1 ?? 1, 1, max(1, cps.length - 1));
      let idx = baseIdx;
      const current = cps[baseIdx];
      if (current && dist(currentX, currentY, current.x, current.y) < current.r * 0.75) {
        idx = min(cps.length - 1, baseIdx + 1);
      }
      const cp = cps[min(cps.length - 1, idx + 1)] || cps[idx];
      if (cp) return { x: cp.x, y: cp.y };
    }
    const prev = m.prevPos?.p1;
    if (prev) return { x: prev.x, y: prev.y };
    return { x: currentX, y: currentY };
  }

  if (mg.name === "COLLECT & AVOID") {
    const coins = (m.items || []).filter(it => it.type === "coin");
    const bombs = (m.items || []).filter(it => it.type === "bomb");
    const predictedBombs = bombs.map((b) => ({
      x: b.x + (b.vx || 0) * 12,
      y: b.y + (b.vy || 0) * 12,
      r: b.radius * 1.28
    }));
    const safetyAt = (x, y) => {
      let minClear = 9999;
      let pressure = 0;
      for (const b of predictedBombs) {
        const clear = dist(x, y, b.x, b.y) - b.r;
        minClear = min(minClear, clear);
        pressure += 1 / max(26, clear + 34);
      }
      return {
        minClear,
        score: minClear - pressure * 560
      };
    };

    if (predictedBombs.length) {
      const nowSafe = safetyAt(currentX, currentY);
      if (nowSafe.minClear < 126) {
        let best = { x: currentX, y: currentY };
        let bestScore = -Infinity;
        for (let sx = 70; sx <= width - 70; sx += 34) {
          for (let sy = 90; sy <= height - 60; sy += 30) {
            const safe = safetyAt(sx, sy);
            const moveCost = dist(currentX, currentY, sx, sy) * 0.07;
            const edgePenalty = min(sx, width - sx, sy, height - sy) < 56 ? 22 : 0;
            const score = safe.score - moveCost - edgePenalty;
            if (score > bestScore) {
              bestScore = score;
              best = { x: sx, y: sy };
            }
          }
        }
        return best;
      }
    }

    if (coins.length) {
      let best = null;
      let bestScore = -Infinity;
      for (const c of coins) {
        const safe = safetyAt(c.x, c.y);
        let segmentDanger = 0;
        for (const b of predictedBombs) {
          const dSeg = segmentPointDistance(currentX, currentY, c.x, c.y, b.x, b.y);
          segmentDanger += max(0, 150 - dSeg);
        }
        const d = dist(currentX, currentY, c.x, c.y);
        const score = safe.score * 1.05 - d * 0.12 - segmentDanger * 2.55;
        if (score > bestScore) {
          bestScore = score;
          best = c;
        }
      }
      if (best && bestScore > 36) {
        return { x: best.x, y: best.y };
      }
    }
    if (bombs.length || coins.length) {
      let best = { x: width * 0.5, y: height * 0.5 };
      let bestSafety = -Infinity;
      for (let sx = 80; sx <= width - 80; sx += 34) {
        for (let sy = 100; sy <= height - 70; sy += 30) {
          const safe = safetyAt(sx, sy);
          const stickiness = dist(currentX, currentY, sx, sy) * 0.05;
          const safety = safe.score - stickiness;
          if (safety > bestSafety) {
            bestSafety = safety;
            best = { x: sx, y: sy };
          }
        }
      }
      return best;
    }
  }

  if (mg.name === "TRACE THE PATH") {
    if (Array.isArray(m.points) && m.points.length) {
      const idx = Math.min((m.idx || 0) + 3, m.points.length - 1);
      return { x: m.points[idx].x, y: m.points[idx].y };
    }
  }

  if (mg.name === "RHYTHM RUSH") {
    const notes = (m.notes || []).filter(n => !n.hit && !n.missed);
    if (notes.length) {
      notes.sort((a, b) => {
        const ta = abs((now - a.spawnMs) - (m.approachMs || 800));
        const tb = abs((now - b.spawnMs) - (m.approachMs || 800));
        const da = dist(currentX, currentY, a.x, a.y);
        const db = dist(currentX, currentY, b.x, b.y);
        return (ta + da * 0.28) - (tb + db * 0.28);
      });
      return { x: notes[0].x, y: notes[0].y };
    }
  }

  return { x: width * 0.5, y: height * 0.5 };
}

function cycleInputMode() {
  const order = ["auto", "mouse", "tag"];
  const idx = order.indexOf(game.runtime.inputMode);
  game.runtime.inputMode = order[(idx + 1) % order.length];
  if (game.runtime.inputMode !== "auto") {
    game.demo.forced = false;
  }
}

function withRuntimeQuery(path) {
  return runtimeQueryString ? `${path}${runtimeQueryString}` : path;
}

function applyURLOverrides() {
  const params = new URLSearchParams(window.location.search);
  runtimeQueryString = window.location.search || "";

  const wsParam = params.get("ws");
  if (wsParam) {
    CONFIG.WS_URL = wsParam;
  }

  const tag1 = Number(params.get("tag1"));
  if (Number.isFinite(tag1)) {
    CONFIG.PLAYER_TAGS.p1 = tag1;
    game.players.p1.tagId = tag1;
  }
  const tag2 = Number(params.get("tag2"));
  if (Number.isFinite(tag2)) {
    CONFIG.PLAYER_TAGS.p2 = tag2;
    game.players.p2.tagId = tag2;
  }
  applySharedCalibrationToPlayer(game.players.p1);
  applySharedCalibrationToPlayer(game.players.p2);

  const input = (params.get("input") || "").toLowerCase();
  if (["auto", "mouse", "tag"].includes(input)) {
    game.runtime.inputMode = input;
  }

  const bot = (params.get("bot") || "").toLowerCase();
  if (["1", "true", "on", "yes"].includes(bot)) {
    game.runtime.botAssist = true;
  }

}

function triggerShake(intensity, duration) {
  game.effects.shake.active = true;
  game.effects.shake.intensity = intensity;
  game.effects.shake.duration = duration;
  game.effects.shake.startMs = millis();
}

function applyScreenShake() {
  const s = game.effects.shake;
  if (!s.active) return;
  const elapsed = millis() - s.startMs;
  if (elapsed >= s.duration) {
    s.active = false;
    return;
  }
  const decay = 1 - elapsed / s.duration;
  translate(random(-1, 1) * s.intensity * decay, random(-1, 1) * s.intensity * decay);
}

function triggerFlash(color, duration, alpha = 120) {
  game.effects.flash.active = true;
  game.effects.flash.color = color;
  game.effects.flash.duration = duration;
  game.effects.flash.startMs = millis();
  game.effects.flash.alpha = alpha;
}

function drawScreenFlash() {
  const f = game.effects.flash;
  if (!f.active) return;
  const elapsed = millis() - f.startMs;
  if (elapsed >= f.duration) {
    f.active = false;
    return;
  }
  const a = map(elapsed, 0, f.duration, f.alpha, 0);
  noStroke();
  fill(f.color[0], f.color[1], f.color[2], a);
  rect(0, 0, width, height);
}

function emitParticles(x, y, color, count = 12, maxSpeed = 5) {
  for (let i = 0; i < count; i++) {
    const ang = random(TWO_PI);
    const spd = random(0.7, maxSpeed);
    game.effects.gameParticles.push({
      x,
      y,
      vx: cos(ang) * spd,
      vy: sin(ang) * spd,
      size: random(3, 8),
      alpha: 255,
      decay: random(4, 8),
      color: [...color]
    });
  }
}

function drawGameParticles() {
  for (let i = game.effects.gameParticles.length - 1; i >= 0; i--) {
    const p = game.effects.gameParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.vx *= 0.99;
    p.alpha -= p.decay;
    p.size *= 0.986;

    if (p.alpha <= 0 || p.size <= 0.7) {
      game.effects.gameParticles.splice(i, 1);
      continue;
    }

    noStroke();
    fill(p.color[0], p.color[1], p.color[2], p.alpha);
    circle(p.x, p.y, p.size);
  }
}

function spawnImpactRing(x, y, color, startR = 20, endR = 210, duration = 360, thickness = 3) {
  game.effects.impactRings.push({
    x, y,
    color: [...color],
    startR,
    endR,
    duration,
    thickness,
    bornMs: millis()
  });
}

function drawImpactRings() {
  const now = millis();
  for (let i = game.effects.impactRings.length - 1; i >= 0; i--) {
    const r = game.effects.impactRings[i];
    const t = constrain((now - r.bornMs) / r.duration, 0, 1);
    if (t >= 1) {
      game.effects.impactRings.splice(i, 1);
      continue;
    }
    const rr = lerp(r.startR, r.endR, t);
    const a = lerp(190, 0, t);
    noFill();
    stroke(r.color[0], r.color[1], r.color[2], a);
    strokeWeight(r.thickness * (1 - t * 0.65));
    circle(r.x, r.y, rr * 2);
  }
}

function addFloatingScore(x, y, textValue, color = CONFIG.COLORS.green) {
  game.effects.floatingScores.push({
    x,
    y,
    text: textValue,
    alpha: 255,
    vy: -2.5,
    life: 50,
    maxLife: 50,
    color
  });
}

function drawFloatingScores() {
  for (let i = game.effects.floatingScores.length - 1; i >= 0; i--) {
    const f = game.effects.floatingScores[i];
    f.y += f.vy;
    f.vy *= 0.94;
    f.life -= 1;
    f.alpha = map(f.life, 0, f.maxLife, 0, 255);

    if (f.life <= 0) {
      game.effects.floatingScores.splice(i, 1);
      continue;
    }

    fill(f.color[0], f.color[1], f.color[2], f.alpha);
    textAlign(CENTER, CENTER);
    textStyle(800);
    textSize(26);
    text(f.text, f.x, f.y);
  }
}

function updateEffects() {
  // Reserved for optional sound hooks and future global effects.
}

function styleGroupIndexFromScore(score) {
  const total = STYLE_GROUPS.length;
  if (!total) return 0;
  const bucket = floor(max(0, score) / STYLE_GROUP_SCORE_STEP);
  return ((bucket % total) + total) % total;
}

function currentStyleGroup() {
  const total = STYLE_GROUPS.length;
  if (!total) return null;
  const idx = ((game.ui.styleGroupIndex % total) + total) % total;
  return STYLE_GROUPS[idx];
}

function scoreForNextStyleGroup() {
  const s = max(0, game.score);
  return (floor(s / STYLE_GROUP_SCORE_STEP) + 1) * STYLE_GROUP_SCORE_STEP;
}

function updateStyleGroupByScore() {
  const next = styleGroupIndexFromScore(game.score);
  if (next === game.ui.styleGroupIndex) return;
  game.ui.styleGroupIndex = next;
  const g = currentStyleGroup();
  if (g) {
    triggerFlash(g.accent || CONFIG.COLORS.cyan, 180, 60);
    addFloatingScore(width * 0.5, height * 0.16, g.name, g.accent || CONFIG.COLORS.cyan);
  }
}

function transitionStyleName(idx) {
  return TRANSITION_STYLE_NAMES[((idx % 4) + 4) % 4];
}

function buildMinigames() {
  minigames = [
    makeTapTargetsMinigame(),
    makeDodgeMinigame(),
    makeWhackAMoleMinigame(),
    makeRedLightMinigame(),
    makeCollectAvoidMinigame(),
    makeRhythmRushMinigame(),

  ];
}

function makeTapTargetsMinigame() {
  return {
    name: "TAP TARGETS",
    description: "Pop enough targets before time runs out",
    color: CONFIG.COLORS.cyan,
    duration: 8500,
    setup(difficulty) {
      game.mini = {
        targets: [],
        spawnMs: millis(),
        spawnInterval: 850 / sqrt(difficulty),
        tapped: 0,
        required: max(5, floor(6 + difficulty * 1.8)),
        maxTargets: min(8, 4 + floor(difficulty)),
        palette: [CONFIG.COLORS.cyan, CONFIG.COLORS.lime, CONFIG.COLORS.orange, CONFIG.COLORS.magenta],
        spawnMode: random(["scatter", "ring", "edge_rush", "diagonal_wave"]),
        waveTick: 0
      };
      for (let i = 0; i < 3; i++) spawnTapTarget(difficulty, game.mini);
    },
    update(players, difficulty) {
      const m = game.mini;
      if (millis() - m.spawnMs >= m.spawnInterval && m.targets.length < m.maxTargets) {
        spawnTapTarget(difficulty, m);
        m.spawnMs = millis();
      }

      for (let i = m.targets.length - 1; i >= 0; i--) {
        const t = m.targets[i];
        if (!t.popping) {
          t.x += t.vx;
          t.y += t.vy;
          if (t.x < t.radius || t.x > width - t.radius) t.vx *= -1;
          if (t.y < 90 + t.radius || t.y > height - 42 - t.radius) t.vy *= -1;
          t.x = constrain(t.x, t.radius, width - t.radius);
          t.y = constrain(t.y, 90 + t.radius, height - 42 - t.radius);
        }
        const age = millis() - t.birthMs;
        if (!t.popping && age > t.lifeMs) {
          m.targets.splice(i, 1);
          continue;
        }

        if (t.popping) {
          if (millis() - t.popMs > 300) {
            m.targets.splice(i, 1);
          }
          continue;
        }

        for (const p of players) {
          if (cursorOverlapsCircle(p, t.x, t.y, t.radius)) {
            p.hoverActive = true;
            t.popping = true;
            t.popMs = millis();
            m.tapped++;
            game.score += 10;
            addFloatingScore(t.x, t.y, "+10", CONFIG.COLORS.green);
            emitParticles(t.x, t.y, t.color, floor(random(12, 16)), 5.5);
            break;
          }
        }
      }

      return null;
    },
    draw() {
      const m = game.mini;
      for (const t of m.targets) {
        if (t.popping) {
          const p = constrain((millis() - t.popMs) / 300, 0, 1);
          const s = lerp(1, 1.6, p);
          const a = lerp(200, 0, p);
          drawTargetGlow(t.x, t.y, t.radius * s, t.color, a);
          noFill();
          stroke(255, a);
          strokeWeight(2);
          circle(t.x, t.y, t.radius * 2 * s);
          continue;
        }

        const lifePct = constrain((millis() - t.birthMs) / t.lifeMs, 0, 1);
        const drawR = t.radius * lerp(1, 0.7, lifePct);
        drawTargetGlow(t.x, t.y, drawR, t.color, 180);

        stroke(t.color[0], t.color[1], t.color[2], 220);
        strokeWeight(2);
        fill(t.color[0], t.color[1], t.color[2], 55);
        circle(t.x, t.y, drawR * 2);

        if (lifePct > 0.7) {
          const pulse = 1 + sin(millis() * 0.02) * 0.12;
          noFill();
          stroke(...CONFIG.COLORS.red, 180);
          strokeWeight(2);
          circle(t.x, t.y, drawR * 2.4 * pulse);
        }
      }

      fill(255, 220);
      textAlign(CENTER, TOP);
      textStyle(700);
      textSize(24);
      text(`Tapped: ${m.tapped} / ${m.required}`, width / 2, 62);
    },
    getStatusText() {
      return `Goal: pop ${game.mini.required} targets (${game.mini.spawnMode})`;
    },
    onTimeout() {
      const m = game.mini;
      const success = m.tapped >= m.required;
      return {
        success,
        points: success ? 30 + floor((game.runtime.currentDifficulty || game.difficulty) * 6) : 0
      };
    },
    getPoints() {
      return 0;
    }
  };
}

function pickTapTargetSpawnPoint(m, radius) {
  const margin = 110 + radius;
  if (m.spawnMode === "ring") {
    const a = random(TWO_PI);
    const rr = min(width, height) * random(0.2, 0.34);
    return {
      x: constrain(width * 0.5 + cos(a) * rr, margin, width - margin),
      y: constrain(height * 0.5 + sin(a) * rr, margin, height - margin)
    };
  }
  if (m.spawnMode === "edge_rush") {
    const side = floor(random(4));
    if (side === 0) return { x: margin, y: random(margin, height - margin) };
    if (side === 1) return { x: width - margin, y: random(margin, height - margin) };
    if (side === 2) return { x: random(margin, width - margin), y: margin };
    return { x: random(margin, width - margin), y: height - margin };
  }
  if (m.spawnMode === "diagonal_wave") {
    const t = (m.waveTick % 8) / 7;
    m.waveTick++;
    return {
      x: lerp(margin, width - margin, t),
      y: lerp(margin, height - margin, 1 - t)
    };
  }
  return {
    x: random(margin, width - margin),
    y: random(margin, height - margin)
  };
}

function spawnTapTarget(difficulty, m = game.mini) {
  const radius = random(28, 52) / pow(difficulty, 0.58);
  const point = pickTapTargetSpawnPoint(m, radius);
  const drift = random(0.18, 0.65) * pow(difficulty, 0.42);
  const ang = random(TWO_PI);
  let vx = cos(ang) * drift;
  let vy = sin(ang) * drift;
  if (m.spawnMode === "edge_rush") {
    const toCenter = createVector(width * 0.5 - point.x, height * 0.5 - point.y).normalize();
    vx = toCenter.x * drift * 1.6;
    vy = toCenter.y * drift * 1.6;
  }
  m.targets.push({
    x: point.x,
    y: point.y,
    radius,
    lifeMs: random(1800, 3200) / pow(difficulty, 0.9),
    birthMs: millis(),
    color: random(m.palette),
    vx,
    vy,
    popping: false,
    popMs: 0
  });
}

function drawTargetGlow(x, y, r, color, alpha) {
  noStroke();
  for (let i = 9; i >= 1; i--) {
    const rr = map(i, 1, 9, r * 0.75, r * 2.0);
    const a = map(i, 1, 9, alpha * 0.18, 0);
    fill(color[0], color[1], color[2], a);
    circle(x, y, rr * 2);
  }
}

function makeDodgeMinigame() {
  return {
    name: "DODGE",
    description: "Avoid hazard patterns",
    color: CONFIG.COLORS.red,
    duration: 11000,
    setup(difficulty) {
      game.mini = {
        obstacles: [],
        spawnMs: millis(),
        spawnInterval: max(230, 690 / pow(difficulty, 1.18)),
        scoreTickMs: millis(),
        survivalTicks: 0,
        pattern: random(["rain", "sweep", "lanes"]),
        patternShiftMs: millis() + random(2200, 3600),
        laneSeed: floor(random(1, 4))
      };
    },
    update(players, difficulty) {
      const m = game.mini;
      if (millis() >= m.patternShiftMs) {
        m.pattern = random(["rain", "sweep", "lanes"]);
        m.patternShiftMs = millis() + random(2200, 3600) / max(1, sqrt(difficulty));
      }

      const spawnInterval = m.pattern === "sweep" ? m.spawnInterval * 1.5 : m.spawnInterval;
      while (millis() - m.spawnMs >= spawnInterval) {
        m.spawnMs += spawnInterval;
        const obstacle = makeDodgeObstacle(difficulty, m.pattern, m.laneSeed, m);
        if (obstacle) m.obstacles.push(obstacle);
      }

      if (millis() - m.scoreTickMs >= 500) {
        m.scoreTickMs += 500;
        m.survivalTicks++;
        game.score += 5;
      }

      for (let i = m.obstacles.length - 1; i >= 0; i--) {
        const o = m.obstacles[i];
        o.x += o.vx || 0;
        o.y += o.speed;
        o.rot += o.rotSpeed;
        if (o.y - o.h * 1.2 > height || o.x < -180 || o.x > width + 180) {
          m.obstacles.splice(i, 1);
          continue;
        }

        for (const p of players) {
          if (circleRectHit(p.screenX, p.screenY, getCursorCollisionRadius(p), o)) {
            p.hoverActive = true;
            return { done: true, success: false, points: 0 };
          }
        }
      }

      return null;
    },
    draw() {
      const m = game.mini;
      for (const o of m.obstacles) {
        push();
        translate(o.x, o.y);
        rotate(o.rot);

        noStroke();
        fill(...CONFIG.COLORS.red, 35);
        rect(-o.w * 0.6, -o.h * 0.8, o.w * 1.2, o.h * 1.6, 12);

        fill(...CONFIG.COLORS.red, 225);

function makeDodgeObstacle(difficulty, pattern, laneSeed = 1, runtime = null) {
  if (pattern === "sweep") {
    const ref = runtime || game.mini || {};
    const obstacles = Array.isArray(ref.obstacles) ? ref.obstacles : [];
    const lanes = 5;
    const laneLoad = Array.from({ length: lanes }, () => 0);
    const centerUsed = new Set();
    for (const o of obstacles) {
      if (o.kind !== "sweep") continue;
      if (!Number.isFinite(o.lane)) continue;
      if (o.lane < 0 || o.lane >= lanes) continue;
      laneLoad[o.lane] += 1;
      if (abs(o.x - width * 0.5) < width * 0.58) {
        centerUsed.add(o.lane);
      }
    }
    if (centerUsed.size >= lanes - 1) return null;

    const minLoad = Math.min(...laneLoad);
    const lanePool = [];
    for (let i = 0; i < lanes; i++) {
      if (laneLoad[i] <= minLoad + 1 && !centerUsed.has(i)) lanePool.push(i);
    }
    if (!lanePool.length) return null;
    const lane = random(lanePool);

    let side = ref.sweepSide || (random() < 0.5 ? -1 : 1);
    ref.sweepSide = -side;
    const laneY = map(lane + 0.5, 0, lanes, 96, height - 96);
    const w = random(92, 150) * pow(difficulty, 0.38);
    return {
      x: side < 0 ? -w * 0.6 : width + w * 0.6,
      y: laneY,
      w,
      h: random(22, 30),
      speed: 0,
      vx: side * random(3.4, 5.4) * pow(difficulty, 0.82),
      rot: random(-0.2, 0.2),
      rotSpeed: random(-0.024, 0.024),
      lane,
      kind: "sweep"
    };
  }

  const w = random(50, 102) * pow(difficulty, 0.56);
  const h = random(18, 30);
  const lanes = 5 + laneSeed;
  const lane = floor(random(lanes));
  const laneX = map(lane + 0.5, 0, lanes, 60, width - 60);
  return {
    x: pattern === "lanes" ? laneX : random(40 + w * 0.5, width - 40 - w * 0.5),
    y: -30,
    w,
    h,
    speed: random(3.4, 7.8) * pow(difficulty, 1.12),
    vx: pattern === "lanes" ? random(-0.5, 0.5) : 0,
    rot: random(-0.2, 0.2),
    rotSpeed: random(-0.015, 0.015),
    kind: pattern
  };
}

function circleRectHit(cx, cy, cr, rectObj) {
  const left = rectObj.x - rectObj.w * 0.5;
  const right = rectObj.x + rectObj.w * 0.5;
  const top = rectObj.y - rectObj.h * 0.5;
  const bottom = rectObj.y + rectObj.h * 0.5;

  const nearestX = constrain(cx, left, right);
  const nearestY = constrain(cy, top, bottom);
  return dist(cx, cy, nearestX, nearestY) < cr;
}

function makeWhackAMoleMinigame() {
  return {
    name: "WHACK-A-MOLE",
    description: "Whack enough moles before timeout",
    color: CONFIG.COLORS.lime,
    duration: 10000,
    setup(difficulty) {
      const cells = makeWhackCells();

      game.mini = {
        cells,
        spawnMs: millis(),
        spawnInterval: max(170, 760 / pow(difficulty, 0.86)),
        activeLimit: min(4, 2 + floor(difficulty * 0.9)),
        activeLifetime: max(520, 1450 / pow(difficulty, 0.85)),
        whackedCount: 0,
        requiredWhacks: max(6, floor(8 + difficulty * 2.2) - (isUwbControlActive() ? 1 : 0)),

      };
      spawnWhackWave();
      spawnWhackWave();
