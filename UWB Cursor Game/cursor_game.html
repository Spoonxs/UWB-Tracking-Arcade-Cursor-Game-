            addFloatingScore(cell.x, cell.y, "+15", CONFIG.COLORS.lime);
            emitParticles(cell.x, cell.y, CONFIG.COLORS.lime, 12, 5);
          }
        }

        if (cell.whacked && millis() - cell.whackedMs > 400) {
          cell.whacked = false;
        }
      }

      return null;
    },
    draw() {
      const m = game.mini;
      for (const cell of m.cells) {
        noStroke();
        fill(255, 12);
        rectMode(CENTER);
        rect(cell.x, cell.y, cell.size, cell.size, 12);

        if (cell.active) {
          const lifePct = constrain((millis() - cell.activeMs) / m.activeLifetime, 0, 1);
          const pulse = 1 + sin(millis() * 0.015) * 0.12;
          drawTargetGlow(cell.x, cell.y, cell.size * 0.22 * pulse, CONFIG.COLORS.lime, 210);

          fill(...CONFIG.COLORS.lime, 220);
          circle(cell.x, cell.y, cell.size * 0.36);

          if (lifePct > 0.6) {
            noFill();
            stroke(...CONFIG.COLORS.red, 180);
            strokeWeight(2);
            circle(cell.x, cell.y, cell.size * 0.56 * (1 + game.runtime.hoverPulse * 0.15));
          }
        }

        if (cell.whacked) {
          const p = constrain((millis() - cell.whackedMs) / 400, 0, 1);
          const s = lerp(1, 0.78, p);
          const a = lerp(180, 0, p);
          noStroke();
          fill(...CONFIG.COLORS.lime, a);
          rect(cell.x, cell.y, cell.size * s, cell.size * s, 12);
        }
      }
      fill(255, 220);
      textAlign(CENTER, TOP);
      textStyle(700);
      textSize(22);
      text(`Whacked: ${m.whackedCount} / ${m.requiredWhacks}`, width / 2, 62);
      rectMode(CORNER);
    },
    getStatusText() {
      const m = game.mini;
      return `Goal: whack ${m.requiredWhacks} moles (${m.spawnPattern})`;
    },
    onTimeout() {
      const m = game.mini;
      const success = m.whackedCount >= m.requiredWhacks;
      return {
        success,
        points: success ? 40 + floor((game.runtime.currentDifficulty || game.difficulty) * 8) : 0
      };
    },
    getPoints() {
      return 0;
    }
  };
}

function makeWhackCells() {
  const cells = [];
  const gap = constrain(min(width, height) * 0.015, 8, 14);
  const availableW = min(width * 0.66, 520);
  const availableH = min(height * 0.48, 360);
  const size = constrain(min((availableW - gap * 2) / 3, (availableH - gap * 2) / 3), 74, 108);
  const cx = width * 0.5;
  const cy = constrain(height * 0.57, 124 + size * 1.5, height - 48 - size * 1.5);

  const total = size * 3 + gap * 2;
  const ox = cx - total * 0.5;
  const oy = cy - total * 0.5;
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const x = ox + c * (size + gap) + size * 0.5;
      const y = oy + r * (size + gap) + size * 0.5;
      cells.push({ x, y, size, active: false, activeMs: 0, whacked: false, whackedMs: 0 });
    }
  }
  return cells;
}

function spawnWhackWave() {
  const m = game.mini;
  if (m.spawnPattern === "burst") {
    const n = 1 + floor(random(1, 3));
    for (let i = 0; i < n; i++) {
      trySpawnMole();
    }
    return;
  }

  if (m.spawnPattern === "sweep") {
    let active = m.cells.filter(c => c.active).length;
    if (active >= m.activeLimit) return;
    const ordered = [...m.cells].sort((a, b) => (a.x - b.x) || (a.y - b.y));
    for (let i = 0; i < 2; i++) {
      if (active >= m.activeLimit) break;
      const idx = (m.sweepIdx + i) % ordered.length;
      const cell = ordered[idx];
      if (!cell.active) {
        cell.active = true;
        cell.activeMs = millis();
        active++;
      }
    }
    m.sweepIdx = (m.sweepIdx + 2) % ordered.length;
    return;
  }

  trySpawnMole();
}

function trySpawnMole() {
  const m = game.mini;
  const active = m.cells.filter(c => c.active).length;
  if (active >= m.activeLimit) return;
  const options = m.cells.filter(c => !c.active);
  if (!options.length) return;
  const chosen = random(options);
  chosen.active = true;
  chosen.activeMs = millis();
}

function pointInCell(x, y, cell) {
  return abs(x - cell.x) <= cell.size * 0.5 && abs(y - cell.y) <= cell.size * 0.5;
}

function nextRedLightPhaseDuration(phase, difficulty, pattern) {
  if (pattern === "flicker") {
    return phase === "green"
      ? random(900, 1700) / max(1, pow(difficulty, 0.92))
      : random(700, 1300) * min(1.12, 1 + (difficulty - 1) * 0.06);
  }
  if (pattern === "long_red") {
    return phase === "green"
      ? random(1500, 2500) / max(1, pow(difficulty, 0.85))
      : random(1500, 2800) * min(1.2, 1 + (difficulty - 1) * 0.08);
  }
  return phase === "green"
    ? random(1700, 3200) / max(1, pow(difficulty, 1.1))
    : random(1200, 2200) * min(1.16, 1 + (difficulty - 1) * 0.05);
}

function redLightReachedCheckpoint(px, py, checkpoints, idx) {
  const safeIdx = constrain(idx, 1, checkpoints.length - 1);
  const target = checkpoints[safeIdx];
  const prev = checkpoints[max(0, safeIdx - 1)];
  const rr = target.r + CONFIG.CURSOR.size * 0.34;
  if (dist(px, py, target.x, target.y) <= rr) return true;

  const segD = segmentPointDistance(prev.x, prev.y, target.x, target.y, px, py);
  const segLen = max(1, dist(prev.x, prev.y, target.x, target.y));
  const travel = ((px - prev.x) * (target.x - prev.x) + (py - prev.y) * (target.y - prev.y)) / (segLen * segLen);
  return segD <= rr * 0.88 && travel >= 0.7;
}

function makeRedLightMinigame() {
  return {
    name: "RED LIGHT GREEN LIGHT",
    description: "Pass each gate on green, freeze cleanly on red",
    color: CONFIG.COLORS.orange,
    duration: 12000,
    setup(difficulty) {
      const margin = 92;
      const routeType = random(["lr", "rl", "tb", "bt"]);
      let startPoint = { x: margin, y: height * 0.55 };
      let endPoint = { x: width - margin, y: height * 0.55 };
      if (routeType === "rl") {
        startPoint = { x: width - margin, y: height * 0.55 };
        endPoint = { x: margin, y: height * 0.55 };
      } else if (routeType === "tb") {
        startPoint = { x: width * 0.5, y: height - margin };
        endPoint = { x: width * 0.5, y: margin };
      } else if (routeType === "bt") {
        startPoint = { x: width * 0.5, y: margin };
        endPoint = { x: width * 0.5, y: height - margin };
      }

      const checkpoints = [];
      const cpCount = 6;
      for (let i = 0; i < cpCount; i++) {
        const t = i / (cpCount - 1);
        const x = lerp(startPoint.x, endPoint.x, t);
        const y = lerp(startPoint.y, endPoint.y, t);
        const wobble = (routeType === "lr" || routeType === "rl") ? sin(t * PI * 2) * 56 : cos(t * PI * 2) * 56;
        checkpoints.push({
          x: constrain((routeType === "lr" || routeType === "rl") ? x : x + wobble, 90, width - 90),
          y: constrain((routeType === "lr" || routeType === "rl") ? y + wobble : y, 90, height - 90),
          r: max(28, 44 - difficulty * 1.8)
        });
      }

      const now = millis();
      const phasePattern = random(["steady", "flicker", "long_red"]);
      const penaltyMode = random(["step_back", "stun", "combo"]);
      game.mini = {
        phase: "green",
        phasePattern,
        phaseEndMs: now + nextRedLightPhaseDuration("green", difficulty, phasePattern),
        phaseStartMs: now,
        redGraceMs: 260,
        penaltyMode,
        routeType,
        startPoint,
        endPoint,
        checkpoints,
        progressIdx: {
          p1: 1,
          p2: 1
        },
        violationCooldown: {
          p1: 0,
          p2: 0
        },
        redStrikes: {
          p1: 0,
          p2: 0
        },
        stunUntil: {
          p1: 0,
          p2: 0
        },
        prevPos: {
          p1: null,
          p2: null
        }
      };
    },
    update(players, difficulty) {
      const m = game.mini;
      const cps = m.checkpoints;
      const now = millis();

      if (now >= m.phaseEndMs) {
        if (m.phase === "green") {
          m.phase = "red";
          m.phaseEndMs = now + nextRedLightPhaseDuration("red", difficulty, m.phasePattern);
        } else {
          m.phase = "green";
          m.phaseEndMs = now + nextRedLightPhaseDuration("green", difficulty, m.phasePattern);
        }
        m.phaseStartMs = now;
        for (const p of players) {
          const key = p.label === "P1" ? "p1" : "p2";
          m.prevPos[key] = { x: p.screenX, y: p.screenY };
        }
      }

      for (const p of players) {
        const key = p.label === "P1" ? "p1" : "p2";
        if (now < m.stunUntil[key]) {
          m.prevPos[key] = { x: p.screenX, y: p.screenY };
          continue;
        }

        if (m.phase === "green") {
          m.redStrikes[key] = 0;
          const idx = constrain(m.progressIdx[key], 1, cps.length - 1);
          if (redLightReachedCheckpoint(p.screenX, p.screenY, cps, idx)) {
            m.progressIdx[key] = min(cps.length, idx + 1);
            const target = cps[idx];
            emitParticles(target.x, target.y, p.color, 8, 3.6);
          }
        } else if (m.prevPos[key]) {
          const delta = dist(p.screenX, p.screenY, m.prevPos[key].x, m.prevPos[key].y);
          const redElapsed = now - m.phaseStartMs;
          const moveThreshold = game.runtime.inputMode === "tag" ? 8.8 : 7.2;
          if (redElapsed > m.redGraceMs && now >= m.violationCooldown[key] && delta > moveThreshold) {
            m.redStrikes[key]++;
            if (m.penaltyMode === "stun") {
              m.stunUntil[key] = now + 480;
            } else if (m.penaltyMode === "combo" && m.redStrikes[key] >= 2) {
              m.progressIdx[key] = max(1, m.progressIdx[key] - 2);
              m.redStrikes[key] = 0;
            } else {
              m.progressIdx[key] = max(1, m.progressIdx[key] - 1);
            }
            m.violationCooldown[key] = now + 320;
            triggerFlash(CONFIG.COLORS.red, 240, 95);
            triggerShake(5, 170);
          }
        }

        m.prevPos[key] = { x: p.screenX, y: p.screenY };

        if (dist(p.screenX, p.screenY, m.endPoint.x, m.endPoint.y) <= 44) {
          return { done: true, success: true, points: 70 };
        }
        if (m.progressIdx[key] >= cps.length) {
          return { done: true, success: true, points: 70 };
        }
      }

      return null;
    },
    draw() {
      const m = game.mini;
      const phaseColor = m.phase === "green" ? CONFIG.COLORS.green : CONFIG.COLORS.red;
      const horizontal = m.routeType === "lr" || m.routeType === "rl";

      // Dark track base
      drawRedLightTrack(m.checkpoints, [12, 16, 28, 210], horizontal ? 96 : 92);

      // Lane fill
      drawRedLightTrack(m.checkpoints, [130, 168, 220, 95], horizontal ? 78 : 74);

      // Bright center line
      drawRedLightTrack(m.checkpoints, [230, 236, 250, 168], 4.5);

      drawStartFinishBadge(m.startPoint.x, m.startPoint.y, "START", [118, 212, 255]);
      drawStartFinishBadge(m.endPoint.x, m.endPoint.y, "FINISH", [255, 188, 120]);

      for (let i = 0; i < m.checkpoints.length; i++) {
        const cp = m.checkpoints[i];
        const filled = i < m.progressIdx.p1;
        const gateW = horizontal ? 14 : cp.r * 1.9;
        const gateH = horizontal ? cp.r * 1.9 : 14;
        noStroke();
        fill(0, 0, 0, 130);
        rectMode(CENTER);
        rect(cp.x, cp.y, gateW + 7, gateH + 7, 6);
        fill(filled ? 94 : 220, filled ? 246 : 220, filled ? 255 : 220, filled ? 220 : 125);
        rect(cp.x, cp.y, gateW, gateH, 6);
      }
      rectMode(CORNER);

      fill(phaseColor[0], phaseColor[1], phaseColor[2], m.phase === "green" ? 15 : 22);
      rect(0, 0, width, height);

      drawHoloTrafficLight(m.phase, width * 0.5, 74);

      const p1Idx = constrain(m.progressIdx.p1, 1, m.checkpoints.length - 1);
      const p1Target = m.checkpoints[p1Idx];
      drawProgressDot(p1Target.x, p1Target.y, CONFIG.CURSOR.p1Color);
      if (game.twoPlayerMode && game.players.p2.active) {
        const p2Idx = constrain(m.progressIdx.p2, 1, m.checkpoints.length - 1);
        const p2Target = m.checkpoints[p2Idx];
        drawProgressDot(p2Target.x, p2Target.y, CONFIG.CURSOR.p2Color);
      }
    },
    getStatusText() {
      const m = game.mini;
      return `Move on green. Red penalty: ${m.penaltyMode.replace("_", " ")}`;
    },
    onTimeout() {
      return { success: false, points: 0 };
    },
    getPoints() {
      return 0;
    }
  };
}

function drawRedLightTrack(checkpoints, strokeCol, weight) {

function makeCollectAvoidMinigame() {
  return {
    name: "COLLECT & AVOID",
    description: "Collect enough coins while bombs hunt you",
    color: CONFIG.COLORS.green,
    duration: 10500,
    setup(difficulty) {
      game.mini = {
        items: [],
        spawnMs: millis(),
        spawnInterval: max(220, 560 / pow(difficulty, 0.95)),
        coinsCollected: 0,
        requiredCoins: max(6, floor(8 + difficulty * 2.2) - (isUwbControlActive() ? 1 : 0)),
        spawnStyle: random(["scatter", "lanes", "corners", "cluster"]),
        bombAI: random(["homing", "orbit", "ambush"])
      };
    },
    update(players, difficulty) {
      const m = game.mini;

      if (millis() - m.spawnMs >= m.spawnInterval) {
        m.spawnMs = millis();
        spawnCollectItem(difficulty, m);
      }

      for (let i = m.items.length - 1; i >= 0; i--) {
        const it = m.items[i];
        if (millis() - it.birthMs > 5000) {
          m.items.splice(i, 1);
          continue;
        }

        it.x += it.vx;
        it.y += it.vy;

        if (it.type === "bomb" && players.length) {
          let nearest = players[0];
          let nearestD = dist(it.x, it.y, nearest.screenX, nearest.screenY);
          for (const p of players) {
            const d = dist(it.x, it.y, p.screenX, p.screenY);
            if (d < nearestD) {
              nearest = p;
              nearestD = d;
            }
          }
          const ax = nearest.screenX - it.x;
          const ay = nearest.screenY - it.y;
          const len = Math.hypot(ax, ay) || 1;
          const steer = min(0.07, 0.018 + difficulty * 0.006);
          if (m.bombAI === "orbit") {
            const tx = -ay / len;
            const ty = ax / len;
            it.vx += tx * steer * 1.2 + (ax / len) * steer * 0.2;
            it.vy += ty * steer * 1.2 + (ay / len) * steer * 0.2;
          } else if (m.bombAI === "ambush") {
            const predX = nearest.screenX + nearest.velocity.x * 16;
            const predY = nearest.screenY + nearest.velocity.y * 16;
            const px = predX - it.x;
            const py = predY - it.y;
            const plen = Math.hypot(px, py) || 1;
            it.vx += (px / plen) * steer * 1.25;
            it.vy += (py / plen) * steer * 1.25;
          } else {
            it.vx += (ax / len) * steer;
            it.vy += (ay / len) * steer;
          }
          const maxSpd = 2.2 + difficulty * 0.55;
          const v = Math.hypot(it.vx, it.vy);
          if (v > maxSpd) {
            it.vx = (it.vx / v) * maxSpd;
            it.vy = (it.vy / v) * maxSpd;
          }
        }

        if (it.x - it.radius < 0 || it.x + it.radius > width) it.vx *= -1;
        if (it.y - it.radius < 0 || it.y + it.radius > height) it.vy *= -1;

        for (const p of players) {
          if (cursorOverlapsCircle(p, it.x, it.y, it.radius)) {
            p.hoverActive = true;
            if (it.type === "coin") {
              game.score += 10;
              m.coinsCollected++;
              addFloatingScore(it.x, it.y, "+10", CONFIG.COLORS.green);
              emitParticles(it.x, it.y, CONFIG.COLORS.green, 11, 5);
              m.items.splice(i, 1);
            } else {
              triggerShake(9, 280);
              triggerFlash(CONFIG.COLORS.red, 280, 110);
              spawnImpactRing(it.x, it.y, CONFIG.COLORS.red, 18, 180, 260, 3.5);
              return { done: true, success: false, points: 0 };
            }
            break;
          }
        }
      }
      return null;
    },
    draw() {
      const m = game.mini;
      for (const it of m.items) {
        const bob = sin((millis() - it.birthMs) * 0.008) * 2;
        if (it.type === "coin") {
          drawTargetGlow(it.x, it.y + bob, it.radius, CONFIG.COLORS.green, 190);
          const drew = drawSpriteScreen("coin", it.x, it.y + bob, it.radius * 2.6, 245);
          if (!drew) {
            noStroke();
            fill(...CONFIG.COLORS.green, 230);
            circle(it.x, it.y + bob, it.radius * 2);
          }
        } else {
          drawTargetGlow(it.x, it.y, it.radius, CONFIG.COLORS.red, 200);
          const drew = drawSpriteScreen("bomb", it.x, it.y, it.radius * 2.6, 245);
          if (!drew) {
            noStroke();
            fill(...CONFIG.COLORS.red, 220);
            circle(it.x, it.y, it.radius * 2);
            stroke(30, 10, 10, 220);
            strokeWeight(3);
            line(it.x - it.radius * 0.45, it.y - it.radius * 0.45, it.x + it.radius * 0.45, it.y + it.radius * 0.45);
            line(it.x + it.radius * 0.45, it.y - it.radius * 0.45, it.x - it.radius * 0.45, it.y + it.radius * 0.45);
          }
          noFill();
          stroke(...CONFIG.COLORS.red, 160);
          circle(it.x, it.y, it.radius * 2.5 * (1 + game.runtime.hoverPulse * 0.08));
        }
      }
      fill(255, 220);
      textAlign(CENTER, TOP);
      textStyle(700);
      textSize(22);
      text(`Coins: ${m.coinsCollected} / ${m.requiredCoins}`, width / 2, 62);
    },
    getStatusText() {
      const m = game.mini;
      return `Goal: collect ${m.requiredCoins} coins (${m.spawnStyle}, ${m.bombAI})`;
    },
    onTimeout() {
      const m = game.mini;
      return { success: m.coinsCollected >= m.requiredCoins, points: m.coinsCollected * 7 };
    },
    getPoints() {
      return 0;
    }
  };
}

function spawnCollectItem(difficulty, m = game.mini) {
  const bombChance = lerp(0.34, 0.65, constrain((difficulty - 1) / 5, 0, 1));
  const isBomb = random() < bombChance;
  const speed = random(1.3, 3.8) * pow(difficulty, 0.56);
  const ang = random(TWO_PI);
  let x = random(40, width - 40);
  let y = random(80, height - 40);

  if (m.spawnStyle === "lanes") {
    const lane = floor(random(4));
    y = map(lane + 0.5, 0, 4, 90, height - 80);
  } else if (m.spawnStyle === "corners") {
    const corner = floor(random(4));
    const cx = corner % 2 === 0 ? 65 : width - 65;
    const cy = corner < 2 ? 100 : height - 80;
    x = cx + random(-24, 24);
    y = cy + random(-24, 24);
  } else if (m.spawnStyle === "cluster" && !isBomb) {
    x = width * 0.5 + random(-120, 120);
    y = height * 0.5 + random(-95, 95);
  }

  m.items.push({
    x: constrain(x, 40, width - 40),
    y: constrain(y, 80, height - 40),
    radius: random(20, 30),
    vx: cos(ang) * speed,
    vy: sin(ang) * speed,
    type: isBomb ? "bomb" : "coin",
    birthMs: millis()
  });
}

function makeRhythmRushMinigame() {
  return {
    name: "RHYTHM RUSH",
    description: "Hit notes as rings close in",
    color: CONFIG.COLORS.magenta,
    duration: 9000,
    setup(difficulty) {
      game.mini = {
        notes: [],
        spawnMs: millis(),
        spawnInterval: max(260, 760 / pow(difficulty, 0.92)),
        approachMs: max(420, 920 / pow(difficulty, 0.68)),
        hitWindowMs: max(80, 170 / pow(difficulty, 0.32)) + (isUwbControlActive() ? 18 : 0),
        hits: 0,
        misses: 0,
        requiredHits: max(6, floor(9 + difficulty * 2.4) - (isUwbControlActive() ? 1 : 0)),
        maxMisses: max(2, 4 - floor((difficulty - 1) * 0.5))
      };
      for (let i = 0; i < 2; i++) spawnRhythmNote();
    },
    update(players) {
      const m = game.mini;
      const now = millis();

      while (now - m.spawnMs >= m.spawnInterval) {
        m.spawnMs += m.spawnInterval;
        spawnRhythmNote();
      }

      for (const note of m.notes) {
        if (note.hit || note.missed) continue;
        const age = now - note.spawnMs;
        if (age > m.approachMs + m.hitWindowMs) {
          note.missed = true;
          note.resolveMs = now;
          m.misses++;
          triggerFlash(CONFIG.COLORS.red, 120, 42);
          spawnImpactRing(note.x, note.y, CONFIG.COLORS.red, 8, 90, 180, 2.4);
          continue;
        }

        for (const p of players) {
          if (!cursorOverlapsCircle(p, note.x, note.y, note.baseRadius)) continue;
          const timingErr = abs(age - m.approachMs);
          if (timingErr <= m.hitWindowMs) {
            note.hit = true;
            note.resolveMs = now;
            m.hits++;
            game.score += 12;
            addFloatingScore(note.x, note.y, "+12", CONFIG.COLORS.magenta);
            emitParticles(note.x, note.y, CONFIG.COLORS.magenta, 10, 4.5);
            spawnImpactRing(note.x, note.y, CONFIG.COLORS.magenta, 8, 90, 180, 2.2);
            p.hoverActive = true;
            break;
          }
        }
      }

      for (let i = m.notes.length - 1; i >= 0; i--) {
        const n = m.notes[i];
        if ((n.hit || n.missed) && millis() - n.resolveMs > 330) {
          m.notes.splice(i, 1);
        }
      }

      if (m.misses > m.maxMisses) {
        return { done: true, success: false, points: 0 };
      }
      if (m.hits >= m.requiredHits) {
        return { done: true, success: true, points: 65 + floor((game.runtime.currentDifficulty || game.difficulty) * 8) };
      }
      return null;
    },
    draw() {
      const m = game.mini;
      const now = millis();
      for (const note of m.notes) {
        if (note.hit || note.missed) {
          const p = constrain((now - note.resolveMs) / 330, 0, 1);
          if (note.hit) {
            const a = lerp(220, 0, p);
            const s = lerp(1, 1.8, p);
            drawTargetGlow(note.x, note.y, note.baseRadius * s, CONFIG.COLORS.magenta, a);
          } else {
            const a = lerp(220, 0, p);
            stroke(...CONFIG.COLORS.red, a);
            strokeWeight(4);
            const rr = note.baseRadius * (1.4 + p * 0.3);
            line(note.x - rr, note.y - rr, note.x + rr, note.y + rr);
            line(note.x + rr, note.y - rr, note.x - rr, note.y + rr);
          }
          continue;
        }

        const age = now - note.spawnMs;
        const p = constrain(age / m.approachMs, 0, 1.4);
        const ringRadius = lerp(note.baseRadius * 4, note.baseRadius * 1.05, min(1, p));

        noFill();
        stroke(...CONFIG.COLORS.magenta, 210);
        strokeWeight(2.5);
        circle(note.x, note.y, ringRadius * 2);

        drawTargetGlow(note.x, note.y, note.baseRadius, CONFIG.COLORS.magenta, 180);
        const drew = drawSpriteScreen("rhythm", note.x, note.y, note.baseRadius * 2.4, 245, sin((now - note.spawnMs) * 0.01) * 0.05);
        if (!drew) {
          fill(...CONFIG.COLORS.magenta, 220);
          noStroke();
          circle(note.x, note.y, note.baseRadius * 2);
          fill(255, 190);
          circle(note.x, note.y, note.baseRadius * 0.8);
        }
      }

      fill(255, 220);
      textAlign(CENTER, TOP);
      textStyle(700);
      textSize(22);
      text(`Hits ${m.hits}/${m.requiredHits}   Misses ${m.misses}/${m.maxMisses}`, width / 2, 62);
    },
    getStatusText() {
      const m = game.mini;
      return `Hit ${m.requiredHits} notes before ${m.maxMisses + 1} misses`;
    },
    onTimeout() {
      const m = game.mini;
      const success = m.hits >= m.requiredHits && m.misses <= m.maxMisses;
      return { success, points: success ? 70 : 0 };
    },
    getPoints() {
      return 0;
    }
  };
}

function spawnRhythmNote() {
  const m = game.mini;
  const margin = 130;
  const baseRadius = 26;
  let x = random(margin, width - margin);
  let y = random(150, height - 150);

  if (m.notes.length) {
    const prev = m.notes[m.notes.length - 1];
    let attempts = 0;
    while (dist(prev.x, prev.y, x, y) < 140 && attempts < 8) {
      x = random(margin, width - margin);
      y = random(150, height - 150);
      attempts++;
    }
  }

  m.notes.push({
    x,
    y,
    baseRadius,
    spawnMs: millis(),
    hit: false,
    missed: false,
    resolveMs: 0
  });
}

function makeTracePathMinigame() {
  return {
    name: "TRACE THE PATH",
    description: "Trace fast or fail",
    color: CONFIG.COLORS.orange,
    duration: 9000,
    setup(difficulty) {
      const points = generateTracePath(difficulty);
      game.mini = {
        points,
        idx: 0
      };
    },
    update(players) {
      const m = game.mini;
      if (!m.points.length) return null;
      const current = m.points[m.idx];
      for (const p of players) {
        if (cursorOverlapsCircle(p, current.x, current.y, 30)) {
          p.hoverActive = true;
          m.idx = min(m.idx + 1, m.points.length - 1);
          if (m.idx >= m.points.length - 1) {
            return { done: true, success: true, points: 80 };
          }
        }
      }
      return null;
    },
    draw() {
      const m = game.mini;
      if (!m.points.length) return;

      noFill();
      stroke(255, 40);
      strokeWeight(20);
      beginShape();
      for (const pt of m.points) vertex(pt.x, pt.y);
      endShape();

      stroke(...CONFIG.COLORS.green, 190);
      strokeWeight(12);
      beginShape();
      for (let i = 0; i <= m.idx; i++) {
        const pt = m.points[i];
        vertex(pt.x, pt.y);
      }
      endShape();

      const cur = m.points[m.idx];
      drawTargetGlow(cur.x, cur.y, 22, CONFIG.COLORS.lime, 210);
      fill(...CONFIG.COLORS.lime, 230);
      noStroke();
      circle(cur.x, cur.y, 18);

      fill(...CONFIG.COLORS.green, 230);
      circle(m.points[0].x, m.points[0].y, 22);

      fill(255, 220);
      circle(m.points[m.points.length - 1].x, m.points[m.points.length - 1].y, 22);

      const pct = floor((m.idx / (m.points.length - 1)) * 100);
      fill(255, 230);
      textAlign(CENTER, TOP);
      textStyle(800);
      textSize(26);
      text(`${pct}%`, width / 2, 62);
    },
    getStatusText() {
      const m = game.mini;
      const pct = floor((m.idx / Math.max(1, m.points.length - 1)) * 100);
      return `Goal: reach 58%+ trace (${pct}%)`;
    },
    onTimeout() {
      const m = game.mini;
      const pct = m.points.length > 1 ? m.idx / (m.points.length - 1) : 0;
      const success = pct >= 0.58;
      return {
        success,
        points: success ? floor(pct * 80) : 0
      };
    },
    getPoints() {
      return 0;
    }
  };
}

function generateTracePath(difficulty) {
  const controlCount = floor(random(5, 8 + min(3, floor((difficulty - 1) * 1.8))));
  const controls = [];
  const margin = 120;
  const style = random(["horizontal", "vertical", "zigzag", "spiral"]);

  for (let i = 0; i < controlCount; i++) {
    let x;
    let y;
    if (style === "horizontal") {
      x = map(i, 0, controlCount - 1, margin, width - margin) + random(-40, 40);
      y = random(margin, height - margin);
    } else if (style === "vertical") {
      x = random(margin, width - margin);
      y = map(i, 0, controlCount - 1, margin, height - margin) + random(-40, 40);
    } else if (style === "zigzag") {
      x = map(i, 0, controlCount - 1, margin, width - margin);
      y = i % 2 === 0 ? margin + random(0, 120) : height - margin - random(0, 120);
    } else {
      const a = map(i, 0, controlCount - 1, -PI * 0.8, PI * 1.6);
      const rr = map(i, 0, controlCount - 1, min(width, height) * 0.08, min(width, height) * 0.32);
      x = width * 0.5 + cos(a) * rr + random(-20, 20);
      y = height * 0.5 + sin(a) * rr + random(-20, 20);
    }
    controls.push({
      x: constrain(x, margin, width - margin),
      y: constrain(y, margin, height - margin)
    });
  }

  const pts = [];
  const total = floor(100 + difficulty * 8);
  for (let i = 0; i < total; i++) {
    const t = i / (total - 1);
    const p = catmullRomSample(controls, t);
    pts.push(p);
  }
  return pts;
}

function catmullRomSample(points, t) {
  const l = points.length;
  const p = (l - 1) * t;
  const intPoint = floor(p);
  const w = p - intPoint;

  const p0 = points[max(0, intPoint - 1)];
  const p1 = points[intPoint];
  const p2 = points[min(l - 1, intPoint + 1)];
  const p3 = points[min(l - 1, intPoint + 2)];

  const x = catmull(p0.x, p1.x, p2.x, p3.x, w);
  const y = catmull(p0.y, p1.y, p2.y, p3.y, w);
  return { x, y };
}

function catmull(p0, p1, p2, p3, t) {
  return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t * t + (-p0 + 3 * p1 - 3 * p2 + p3) * t * t * t);
}

class LowPassFilter {
  constructor(alpha, initVal = 0) {
    this.y = initVal;
    this.s = initVal;
    this.initialized = false;
    this.setAlpha(alpha);
  }

  setAlpha(alpha) {
    this.alpha = alpha;
  }

  filter(value) {
    let result;
    if (this.initialized) {
      result = this.alpha * value + (1 - this.alpha) * this.s;
    } else {
      result = value;
      this.initialized = true;
    }
    this.y = value;
    this.s = result;
    return result;
  }

  hasLastRawValue() {
    return this.initialized;
  }

  lastRawValue() {
    return this.y;
  }

  reset(value = 0) {
    this.y = value;
    this.s = value;
    this.initialized = false;
  }
}

class OneEuroFilter {
  constructor(freq, minCutoff = 1.0, beta = 0.0, dCutoff = 1.0) {
    this.freq = freq;
    this.minCutoff = minCutoff;
    this.beta = beta;
    this.dCutoff = dCutoff;
    this.x = new LowPassFilter(this.alpha(minCutoff));
    this.dx = new LowPassFilter(this.alpha(dCutoff));
    this.lastTime = null;
  }

  alpha(cutoff) {
    const te = 1.0 / this.freq;
    const tau = 1.0 / (2 * Math.PI * cutoff);
    return 1.0 / (1.0 + tau / te);
  }

  filter(value, timestamp = null) {
    if (this.lastTime !== null && timestamp !== null) {
      const dt = timestamp - this.lastTime;
      if (dt > 0) this.freq = 1.0 / dt;
    }
    this.lastTime = timestamp;

    const dValue = this.x.hasLastRawValue() ? (value - this.x.lastRawValue()) * this.freq : 0.0;
    const edValue = this.dx.filter(dValue);
    const cutoff = this.minCutoff + this.beta * Math.abs(edValue);
    this.x.setAlpha(this.alpha(cutoff));
    return this.x.filter(value);
  }
}
